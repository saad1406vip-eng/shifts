<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>نظام ورديات المختبر - نسخة إصلاح السواد والطباعة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --main-bg: #0a0f1e;
  --card-bg: #0d1a2e;
  --accent: #38bdf8;
  --text: #e2e8f0;
  --border: rgba(30, 58, 95, 0.4);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{height:100%;background:var(--main-bg);font-family:'Tajawal',sans-serif;direction:rtl;color:var(--text);overflow-x:hidden}

/* الهيدر */
#header{background:linear-gradient(135deg,#0d1a2e,#0a0f1e);border-bottom:1px solid #1e3a5f;padding:12px;position:sticky;top:0;z-index:200}
#header h1{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:12px;text-align:center}

.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center}
.controls input[type=month]{background:#0d1526;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:8px;padding:7px 10px;font-size:13px}

.btn{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:4px}
.btn-green{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
.btn-blue{background:rgba(56,189,248,0.15);color:#38bdf8;border:1px solid rgba(56,189,248,0.3)}
.btn-amber{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}

/* الجدول */
#tableWrap{overflow:auto;padding:10px;-webkit-overflow-scrolling:touch}
#mainTable{border-collapse:separate;border-spacing:0;background:var(--card-bg);font-size:11px;white-space:nowrap;border-radius:10px;width:max-content}

/* تصحيح الهيدر المثبت */
#mainTable th {
  background:#1e3a5f; color:#94a3b8; padding:10px 6px;
  border:1px solid var(--main-bg); position:sticky; top:0; z-index:50;
}

/* ═══ تصحيح مشكلة السواد والاختفاء الرأسي ═══ */
.sticky-name, .sticky-dept {
  background:#0d1a2e !important; /* لون ثابت وقوي لمنع السواد */
}

.sticky-name {
  position: sticky; right: 0; z-index: 100 !important; /* تأمين الأولوية الرأسية والأفقية */
  color: var(--accent); min-width: 120px; text-align: right;
  padding: 10px !important; font-weight: 700; cursor: pointer;
  border-left: 1px solid var(--border);
}

.sticky-dept {
  position: sticky; right: 120px; z-index: 99 !important;
  min-width: 95px; border-left: 1px solid var(--border);
}

/* ضمان أن خلايا الهيدر المثبتة لها z-index أعلى */
#mainTable th.sticky-name { z-index: 150 !important; }
#mainTable th.sticky-dept { z-index: 149 !important; }

#mainTable td{border:1px solid var(--border);padding:4px;text-align:center}
.shift-sel{background:transparent;border:none;font-size:12px;font-weight:800;width:35px;cursor:pointer;border-radius:4px;text-align:center}
.s-M{color:#0ea5e9;background:rgba(14,165,233,0.1)}
.s-E{color:#f59e0b;background:rgba(245,158,11,0.1)}
.s-N{color:#a78bfa;background:rgba(139,92,246,0.1)}
.s-O{color:#64748b;background:rgba(100,116,139,0.05)}

.day-we{background:rgba(239,68,68,0.08) !important;color:#f87171}
.dept-sel{background:#1e293b;border:none;color:#e2e8f0;border-radius:4px;font-size:10px;padding:3px;width:90px}

/* ═══ تصحيح إعدادات الطباعة لظهور القسم والوضوح الكامل ═══ */
@media print {
  @page { size: A4 landscape; margin: 5mm; }
  #header, .btn, .del-btn { display: none !important; }
  body { background: white; color: black; padding: 0; overflow: visible !important; }
  #tableWrap { padding: 0; overflow: visible !important; }
  #mainTable { width: 100%; font-size: 9px; border: 1px solid #000; table-layout: fixed; }

  /* ضمان ظهور عمودي الاسم والقسم */
  #mainTable th, #mainTable td {
    border: 1px solid #000;
    color: black !important;
    background: white !important;
    position: static !important; /* إلغاء التثبيت للطباعة */
    opacity: 1 !important; /* منع الطمس */
  }

  .sticky-name { width: 15% !important; text-align: right !important; padding-right: 5px !important; }
  .sticky-dept { width: 12% !important; display: table-cell !important; visibility: visible !important; }

  /* تنسيق اختيار الشفت في الطباعة */
  .shift-sel { font-weight: bold; background: transparent !important; color: black !important; }
  .day-we { background: transparent !important; border: 1px solid #000 !important; }

  /* ضمان ظهور القسم المختار بدلاً من قائمة المنسدلة */
  .dept-sel { display: none !important; }
  .dept-txt-print { display: inline !important; font-size: 8px; color: black; }
}

.dept-txt-print { display: none; } /* مخفي في العرض العادي */

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0ea5e9;color:white;padding:8px 20px;border-radius:20px;z-index:1000;display:none}
</style>
</head>
<body>

<div id="header">
  <h1>🏥 نظام ورديات المختبر</h1>
  <div class="controls">
    <input type="month" id="monthPicker"/>
    <button class="btn btn-green" onclick="addTech()">➕ إضافة فني</button>
    <button class="btn btn-blue" onclick="addNewDept()">📁 إضافة قسم</button>
    <button class="btn btn-amber" onclick="autoSchedule()">⚙️ توزيع تلقائي</button>
    <button class="btn" style="background:#1e3a5f; color:white" onclick="window.print()">🖨️ طباعة A4</button>
  </div>
</div>

<div id="tableWrap">
  <table id="mainTable"></table>
</div>

<div id="toast"></div>

<script>
// الإبقاء على مصفوفات البيانات والبرمجة الخاصة بك كما هي تماماً
let DEPTS=["رئيس قسم","المدير الطبي","بنك الدم","الاستقبال","الكيمياء","الهيماتولوجي","السيرولوجي","ميكرو","طفيليات","الانسجة والسموم"];
let SHIFTS=["M","E","N","O"];
let DAYAR=["أح","إث","ثل","أر","خم","جم","سب"];

// مصفوفة الموظفين كاملة
let data=[
  {name:"علي عبدالخالق",dept:"رئيس قسم"},
  {name:"الدكتور حاتم",dept:"المدير الطبي"},
  {name:"فهد عبدالله",dept:"بنك الدم"},
  {name:"محمد سعد",dept:"بنك الدم"},
  {name:"نايف محبوب",dept:"بنك الدم"},
  {name:"محمد خلف",dept:"الاستقبال"},
  {name:"سعد علي",dept:"الكيمياء"},
  {name:"بدر محمد",dept:"الكيمياء"},
  {name:"محمد صالح",dept:"الكيمياء"},
  {name:"منصور محمد",dept:"الكيمياء"},
  {name:"محمد دخيل",dept:"الكيمياء"},
  {name:"سلطان محمد",dept:"الهيماتولوجي"},
  {name:"حسام سعيد",dept:"الهيماتولوجي"},
  {name:"سعد عيد",dept:"الهيماتولوجي"},
  {name:"مسفر عايض",dept:"السيرولوجي"},
  {name:"محمد ناصر",dept:"السيرولوجي"},
  {name:"محمد سهلان",dept:"السيرولوجي"},
  {name:"عبدالرحمن صالح",dept:"ميكرو"},
  {name:"عبدالعزيز الزهراني",dept:"ميكرو"},
  {name:"نايف محمد",dept:"ميكرو"},
  {name:"محمد ناصر الطفيليات",dept:"طفيليات"}
];

let yr, mo, nd;

function lsv(){ localStorage.setItem("lab_v4_data", JSON.stringify({data, DEPTS, mv:document.getElementById("monthPicker").value})); }
function lsl(){
  let stored = localStorage.getItem("lab_v4_data");
  if(stored){
    let p = JSON.parse(stored);
    data = p.data;
    if(p.DEPTS) DEPTS = p.DEPTS;
    document.getElementById("monthPicker").value = p.mv;
  }
}

function render(){
  let val = document.getElementById("monthPicker").value;
  yr = val ? parseInt(val.split("-")[0]) : new Date().getFullYear();
  mo = val ? parseInt(val.split("-")[1]) : new Date().getMonth()+1;
  nd = new Date(yr, mo, 0).getDate();

  // الهيدر مع التصحيح البرمجي للـ z-index
  let h = `<thead><tr><th class="sticky-name">الاسم</th><th class="sticky-dept">القسم</th>`;
  for(let d=1; d<=nd; d++){
    let w = new Date(yr, mo-1, d).getDay();
    h += `<th class="${(w===5||w===6)?'day-we':''}"><div>${DAYAR[w]}</div>${d}</th>`;
  }
  h += `<th>العمل</th><th>حذف</th></tr></thead><tbody>`;

  data.forEach((tech, i) => {
    if(!tech.shifts || tech.shifts.length !== nd) tech.shifts = Array(nd).fill("O");
    let workDays = tech.shifts.filter(s => s !== "O").length;

    h += `<tr>`;
    h += `<td class="sticky-name" onclick="renameTech(${i})">${tech.name}</td>`;
    
    // القسم مع ميزة العرض في الطباعة وتعديلها في العرض العادي
    h += `<td class="sticky-dept">
            <select class="dept-sel" onchange="chDept(${i},this.value)">`;
    DEPTS.forEach(d => h += `<option ${tech.dept===d?'selected':''}>${d}</option>`);
    h += `  </select>
            <span class="dept-txt-print">${tech.dept}</span> </td>`;

    for(let di=0; di<nd; di++){
      let s = tech.shifts[di] || "O";
      let w = new Date(yr, mo-1, di+1).getDay();
      h += `<td class="${(w===5||w===6)?'day-we':''}">
            <select class="shift-sel s-${s}" onchange="setSh(${i},${di},this.value)">`;
      SHIFTS.forEach(sh => h += `<option value="${sh}" ${s===sh?'selected':''}>${sh}</option>`);
      h += `</select></td>`;
    }
    h += `<td style="font-weight:700; color:#22c55e">${workDays}</td>`;
    h += `<td><button class="del-btn" style="background:none; border:none; color:#ef4444; cursor:pointer" onclick="delT(${i})">🗑</button></td></tr>`;
  });

  document.getElementById("mainTable").innerHTML = h;
  lsv();
}

// تعديل الاسم عند الضغط
function renameTech(i) {
  let n = prompt("تعديل اسم الموظف:", data[i].name);
  if(n) { data[i].name = n; render(); }
}

// إضافة قسم جديد
function addNewDept() {
  let d = prompt("أدخل اسم القسم الجديد:");
  if(d && !DEPTS.includes(d)) {
    DEPTS.push(d);
    render();
    toast("تم إضافة القسم بنجاح");
  }
}

function setSh(i, di, v){ data[i].shifts[di]=v; render(); }
function chDept(i, v){ data[i].dept=v; render(); }
function delT(i){ if(confirm("حذف الموظف؟")){ data.splice(i,1); render(); } }

function addTech(){
  let n = prompt("اسم الفني الجديد:");
  if(n){ data.push({name:n, dept:DEPTS[0], shifts:Array(nd).fill("O")}); render(); }
}

// التوزيع التلقائي السريع
function autoSchedule(){
  if(!confirm("سيتم إعادة توزيع الورديات تلقائياً. هل أنت متأكد؟")) return;
  data.forEach((tech, i) => {
    tech.shifts = [];
    for(let d=1; d<=nd; d++){
      let w = new Date(yr, mo-1, d).getDay();
      if(w===5 || w===6) tech.shifts.push("O");
      else tech.shifts.push(SHIFTS[(i + d) % 3]);
    }
  });
  render();
  toast("تم التوزيع التلقائي");
}

function toast(m){
  let t=document.getElementById("toast"); t.textContent=m; t.style.display="block";
  setTimeout(()=>t.style.display="none", 2000);
}

window.onload = () => {
  let now = new Date();
  document.getElementById("monthPicker").value = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
  lsl();
  render();
  document.getElementById("monthPicker").onchange = render;
};
</script>
</body>
</html>

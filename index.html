<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lab Scheduler Pro++</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📊 نظام إدارة ورديات المختبر - Pro++</h1>

<div class="controls">
    <label>الشهر: <input type="month" id="monthPicker" onchange="changeMonth(this.value)"></label>
    <button onclick="addSection()">➕ إضافة قسم</button>
    <input id="newTechName" placeholder="اسم الفني">
    <select id="newTechDept">
        <option>رئيس قسم</option>
        <option>المدير الطبي</option>
        <option>بنك الدم</option>
        <option>الاستقبال</option>
        <option>الكيمياء</option>
        <option>الهيماتولوجي</option>
        <option>السيرولوجي</option>
        <option>ميكرو</option>
        <option>طفيليات</option>
        <option>الانسجة والسموم</option>
    </select>
    <button onclick="addTech()">➕ إضافة فني</button>
    <button onclick="autoSchedule()">⚙️ توزيع تلقائي</button>
    <button onclick="printTable()">🖨️ طباعة الجدول</button>
    <button onclick="exportCSV()">📤 تصدير بيانات التواصل</button>
</div>

<div id="table"></div>

<script src="app.js"></script>
</body>
</html>

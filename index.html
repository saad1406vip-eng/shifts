<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>جدول المختبر</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

<h1>📊 نظام إدارة ورديات المختبر</h1>

<div class="controls">
    <label>الشهر: <input type="month" id="monthPicker" onchange="render()"></label>

    <input id="newTechName" placeholder="اسم الفني">

    <select id="newTechDept">
        <option>رئيس قسم</option>
        <option>المدير الطبي</option>
        <option>بنك الدم</option>
        <option>الاستقبال</option>
        <option>الكيمياء</option>
        <option>الهيماتولوجي</option>
        <option>السيرولوجي</option>
        <option>ميكرو</option>
        <option>طفيليات</option>
        <option>الانسجة والسموم</option>
    </select>

    <button onclick="addTech()">➕ إضافة فني</button>
    <button onclick="autoSchedule()">⚙️ توزيع</button>
    <button onclick="printTable()">🖨️ طباعة</button>
</div>

<div id="tableContainer">
    <table id="table"></table>
</div>

<script src="app.js"></script>
</body>
</html>

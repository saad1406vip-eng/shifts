<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ورديات المختبر"/>
<meta name="theme-color" content="#0d1a2e"/>
<title>ورديات المختبر 🏥</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="header">
  <h1>🏥 نظام ورديات المختبر</h1>
  <div class="controls">
    <input type="month" id="monthPicker"/>
    <input type="text" id="newName" placeholder="اسم الفني"/>
    <select id="newDept">
      <option>رئيس قسم</option>
      <option>المدير الطبي</option>
      <option>بنك الدم</option>
      <option>الاستقبال</option>
      <option>الكيمياء</option>
      <option>الهيماتولوجي</option>
      <option>السيرولوجي</option>
      <option>ميكرو</option>
      <option>طفيليات</option>
      <option>الانسجة والسموم</option>
    </select>
    <button class="btn btn-green" onclick="addTech()">➕ إضافة</button>
    <button class="btn btn-amber" onclick="autoSchedule()">⚙️ توزيع تلقائي</button>
    <button class="btn btn-blue" onclick="window.print()">🖨️ طباعة</button>
    <button class="btn btn-purple" onclick="exportCSV()">⬇️ CSV</button>
  </div>
</div>

<div id="statsBar"></div>
<div id="tableWrap"><table id="mainTable"></table></div>
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>

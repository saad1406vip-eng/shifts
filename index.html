<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ورديات المختبر"/>
<meta name="theme-color" content="#0d1a2e"/>
<title>ورديات المختبر</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0f1e;font-family:'Tajawal','Cairo',Arial,sans-serif;direction:rtl;color:#e2e8f0;overflow-x:hidden}
input,select,button{font-family:inherit;outline:none}
button{cursor:pointer}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:#0d1a2e}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
#header{background:linear-gradient(135deg,#0d1a2e,#0a0f1e);border-bottom:1px solid #1e3a5f;padding:12px 16px;position:sticky;top:0;z-index:100}
#header h1{font-size:17px;font-weight:700;color:#38bdf8;margin-bottom:10px}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.controls input[type=month],.controls input[type=text],.controls select{background:#0d1526;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:8px;padding:7px 10px;font-size:13px}
.controls input[type=text]{width:130px}
.btn{padding:7px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-green{background:#0d1526;color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.btn-blue{background:#0d1526;color:#38bdf8;border:1px solid rgba(56,189,248,.3)}
.btn-amber{background:#0d1526;color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.btn-purple{background:#0d1526;color:#a78bfa;border:1px solid rgba(167,139,250,.3)}
#statsBar{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;background:#0a0f1e;border-bottom:1px solid rgba(30,58,95,.2)}
.stat-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:12px}
#tableWrap{overflow:auto;padding:12px;-webkit-overflow-scrolling:touch}
#mainTable{border-collapse:collapse;background:#0d1a2e;font-size:11px;white-space:nowrap}
#mainTable th{background:#1e3a5f;color:#94a3b8;padding:5px 6px;border:1px solid #0a0f1e;font-weight:600;position:sticky;top:0;z-index:10;text-align:center}
#mainTable th.col-name{position:sticky;right:0;z-index:20;background:#1e293b;min-width:110px;text-align:right;padding-right:8px}
#mainTable th.col-dept{position:sticky;right:110px;z-index:20;background:#1e293b;min-width:90px}
#mainTable td{border:1px solid rgba(30,58,95,.3);padding:3px 4px;text-align:center;vertical-align:middle}
#mainTable td.td-name{position:sticky;right:0;background:#0d1a2e;font-size:12px;text-align:right;padding:5px 8px;font-weight:500;min-width:110px;max-width:110px;overflow:hidden;text-overflow:ellipsis;cursor:grab;border-right:3px solid #1e3a5f}
#mainTable td.td-dept{position:sticky;right:110px;background:#0d1a2e;min-width:90px}
#mainTable tr:hover td{filter:brightness(1.15)}
.dept-sep td{border-top:2px solid #38bdf8 !important}
.shift-sel{background:transparent;border:none;font-size:12px;font-weight:700;width:36px;padding:2px;cursor:pointer;border-radius:4px}
.s-M{color:#0ea5e9;background:rgba(14,165,233,.15)}
.s-E{color:#f59e0b;background:rgba(245,158,11,.15)}
.s-N{color:#a78bfa;background:rgba(139,92,246,.15)}
.s-O{color:#64748b;background:rgba(100,116,139,.08)}
.day-we th,.day-we-col{background:rgba(239,68,68,.08) !important}
.day-we-hdr{color:#f87171 !important;background:rgba(239,68,68,.15) !important}
.dept-sel{background:#0d1526;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:6px;font-size:10px;padding:2px 4px;width:88px;cursor:pointer}
.dept-txt{display:none;font-size:10px}
.del-btn{background:none;border:none;color:#ef4444;font-size:14px;cursor:pointer;padding:2px 6px}
.dragging-row{opacity:.4}
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#0d1a2e;border:1px solid #0ea5e9;border-radius:20px;padding:8px 20px;font-size:13px;color:#38bdf8;z-index:999;white-space:nowrap;display:none}
@media print{
  #header,#statsBar,#toast{display:none!important}
  #printHeader,#printFooter{display:block !important}
  body{background:#fff;color:#000}
  #tableWrap{overflow:visible;padding:0}
  #mainTable{font-size:9px;width:100%}
  #mainTable th,#mainTable td{border:1px solid #999;padding:2px 3px;color:#000 !important;background:#fff !important}
  #mainTable th.col-name,#mainTable td.td-name,#mainTable th.col-dept,#mainTable td.td-dept{position:static}
  .shift-sel{font-size:9px;width:auto}
  .dept-sel,.del-btn{display:none}
  .dept-txt{display:inline !important;font-size:9px;color:#000}
  #mainTable input[type=text]{display:none}
  #printHeader,#printFooter{display:block !important}
  #printHeader{text-align:center;margin-bottom:10px;font-family:Arial,sans-serif;direction:rtl}
  #printHeader .org{font-size:13px;font-weight:700;color:#000;margin-bottom:3px}
  #printHeader .hosp{font-size:12px;color:#333;margin-bottom:3px}
  #printHeader .month{font-size:11px;color:#555;border:1px solid #999;display:inline-block;padding:3px 14px;border-radius:4px;margin-top:4px}
  #printFooter{margin-top:18px;direction:rtl;font-family:Arial,sans-serif}
  #printFooter table{width:100%;border-collapse:collapse}
  #printFooter td{border:1px solid #999;padding:8px 14px;font-size:11px;width:50%;text-align:center;vertical-align:bottom}
  #printFooter .sig-label{font-weight:700;font-size:11px;margin-bottom:20px}
  #printFooter .sig-line{border-top:1px solid #555;margin-top:28px;padding-top:4px;font-size:10px;color:#555}
  @page{size:A3 landscape;margin:10mm}
}
#printHeader,#printFooter{display:none}
</style>
</head>
<body>
<div id="header">
  <h1>&#x1F3E5; نظام ورديات المختبر</h1>
  <div class="controls">
    <input type="month" id="monthPicker"/>
    <input type="text" id="newName" placeholder="اسم الفني"/>
    <select id="newDept">
      <option>رئيس قسم</option><option>المدير الطبي</option><option>بنك الدم</option>
      <option>الاستقبال</option><option>الكيمياء</option><option>الهيماتولوجي</option>
      <option>السيرولوجي</option><option>ميكرو</option><option>طفيليات</option>
      <option>الانسجة والسموم</option>
    </select>
    <button class="btn btn-green" onclick="addTech()">&#x2795; إضافة فني</button>
    <button class="btn btn-green" onclick="showAddDept()">&#x2795; قسم جديد</button>
    <button class="btn btn-amber" onclick="autoSchedule()">&#x2699;&#xFE0F; توزيع تلقائي</button>
    <button class="btn btn-blue" onclick="window.print()">&#x1F5A8;&#xFE0F; طباعة</button>
    <button class="btn btn-purple" onclick="exportCSV()">&#x2B07;&#xFE0F; CSV</button>
    <button class="btn" style="background:#0d1526;color:#94a3b8;border:1px solid rgba(148,163,184,.3)" onclick="showManage()">&#x2699;&#xFE0F; إدارة</button>
  </div>
</div>
<div id="statsBar"></div>

<div id="printHeader" style="display:none;text-align:center;padding:6px 0 10px;border-bottom:2px solid #000;margin-bottom:8px">
  <div style="font-size:14px;font-weight:700">تجمع عسير الصحي</div>
  <div style="font-size:13px;font-weight:700;margin:3px 0">مستشفى سبت العلايه العام</div>
  <div id="printMonthTitle" style="font-size:12px;color:#333;margin-top:4px">جدول توزيع الورديات</div>
</div>

<div id="tableWrap"><table id="mainTable"></table></div>

<div id="printFooter" style="display:none;margin-top:24px;padding-top:10px;border-top:2px solid #000">
  <!-- جدول المسؤوليات -->
  <div id="printNotes" style="margin-bottom:16px"></div>
  <table style="width:100%;border-collapse:collapse">
    <tr>
      <td style="width:50%;text-align:center;padding:8px;border:1px solid #999">
        <div style="font-weight:700;font-size:12px;margin-bottom:36px">اعتماد / توقيع مشرف فنيي المختبر</div>
        <div style="border-top:1px solid #000;width:70%;margin:0 auto;padding-top:5px;font-size:10px;color:#555">الاسم والتوقيع</div>
      </td>
      <td style="width:50%;text-align:center;padding:8px;border:1px solid #999">
        <div style="font-weight:700;font-size:12px;margin-bottom:36px">اعتماد / توقيع رئيس المختبر</div>
        <div style="border-top:1px solid #000;width:70%;margin:0 auto;padding-top:5px;font-size:10px;color:#555">الاسم والتوقيع</div>
      </td>
    </tr>
  </table>
</div>

<div id="toast"></div>

<!-- Modal: إضافة قسم جديد -->
<div id="modalAddDept" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-end;justify-content:center">
  <div style="background:#111827;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:20px">
    <div style="width:36px;height:4px;background:#334155;border-radius:2px;margin:0 auto 14px"></div>
    <div style="font-size:15px;font-weight:700;color:#38bdf8;margin-bottom:14px">➕ إضافة قسم جديد</div>
    <input id="inputNewDept" type="text" placeholder="اسم القسم الجديد" style="background:#0d1526;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;width:100%;margin-bottom:12px"/>
    <input id="inputNewDeptColor" type="color" value="#06b6d4" style="width:48px;height:36px;border:none;border-radius:8px;cursor:pointer;margin-bottom:12px;background:none"/>
    <span style="color:#64748b;font-size:12px;vertical-align:middle"> اللون</span>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button onclick="closeModals()" style="flex:1;padding:11px;border-radius:12px;background:transparent;color:#64748b;border:1px solid #1e3a5f;font-family:inherit;font-size:14px;cursor:pointer">إلغاء</button>
      <button onclick="doAddDept()" style="flex:1;padding:11px;border-radius:12px;background:#0ea5e9;color:#fff;border:none;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer">إضافة</button>
    </div>
  </div>
</div>

<!-- Modal: إدارة الأقسام والموظفين -->
<div id="modalManage" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 0">
  <div style="background:#111827;border-radius:16px;width:100%;max-width:500px;padding:20px;margin:auto">
    <div style="font-size:15px;font-weight:700;color:#38bdf8;margin-bottom:16px">⚙️ إدارة الأقسام والموظفين</div>

    <!-- إعادة تسمية موظف -->
    <div style="margin-bottom:18px">
      <div style="font-size:13px;color:#94a3b8;margin-bottom:8px;font-weight:600">✏️ إعادة تسمية موظف</div>
      <select id="selRenameEmp" style="background:#0d1526;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;width:100%;margin-bottom:8px;font-family:inherit"></select>
      <input id="inputRenameEmp" type="text" placeholder="الاسم الجديد" style="background:#0d1526;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;width:100%;margin-bottom:8px"/>
      <button onclick="doRenameEmp()" style="padding:8px 18px;border-radius:8px;background:#0ea5e9;color:#fff;border:none;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer">تغيير الاسم</button>
    </div>

    <!-- إعادة تسمية قسم -->
    <div style="margin-bottom:18px">
      <div style="font-size:13px;color:#94a3b8;margin-bottom:8px;font-weight:600">🏷️ إعادة تسمية قسم</div>
      <select id="selRenameDept" style="background:#0d1526;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;width:100%;margin-bottom:8px;font-family:inherit"></select>
      <input id="inputRenameDept" type="text" placeholder="الاسم الجديد للقسم" style="background:#0d1526;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;width:100%;margin-bottom:8px"/>
      <button onclick="doRenameDept()" style="padding:8px 18px;border-radius:8px;background:#f59e0b;color:#0a0f1e;border:none;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer">تغيير اسم القسم</button>
    </div>

    <button onclick="closeModals()" style="width:100%;padding:11px;border-radius:12px;background:transparent;color:#64748b;border:1px solid #1e3a5f;font-family:inherit;font-size:14px;cursor:pointer;margin-top:4px">إغلاق</button>
  </div>
</div>
<script>
var DEPTS=["رئيس قسم","المدير الطبي","بنك الدم","الاستقبال","الكيمياء","الهيماتولوجي","السيرولوجي","ميكرو","طفيليات","الانسجة والسموم"];
var SHIFTS=["M","E","N","O"];
var SLBL={M:"صباحي",E:"مسائي",N:"ليلي",O:"إجازة"};
var SCLR={M:"#0ea5e9",E:"#f59e0b",N:"#a78bfa",O:"#64748b"};
var DCLR={"رئيس قسم":"#ef4444","المدير الطبي":"#f97316","بنك الدم":"#ec4899","الاستقبال":"#14b8a6","الكيمياء":"#0ea5e9","الهيماتولوجي":"#8b5cf6","السيرولوجي":"#22c55e","ميكرو":"#f59e0b","طفيليات":"#06b6d4","الانسجة والسموم":"#84cc16"};
var DAYAR=["أح","إث","ثل","أر","خم","جم","سب"];
var LK="lab_v2";

var data=[
  {name:"علي عبدالخالق",dept:"رئيس قسم"},
  {name:"الدكتور حاتم",dept:"المدير الطبي"},
  {name:"فهد عبدالله",dept:"بنك الدم"},
  {name:"محمد سعد",dept:"بنك الدم"},
  {name:"نايف محبوب",dept:"بنك الدم"},
  {name:"محمد خلف",dept:"الاستقبال"},
  {name:"سعد علي",dept:"الكيمياء"},
  {name:"بدر محمد",dept:"الكيمياء"},
  {name:"محمد صالح",dept:"الكيمياء"},
  {name:"منصور محمد",dept:"الكيمياء"},
  {name:"محمد دخيل",dept:"الكيمياء"},
  {name:"سلطان محمد",dept:"الهيماتولوجي"},
  {name:"حسام سعيد",dept:"الهيماتولوجي"},
  {name:"سعد عيد",dept:"الهيماتولوجي"},
  {name:"مسفر عايض",dept:"السيرولوجي"},
  {name:"محمد ناصر",dept:"السيرولوجي"},
  {name:"محمد سهلان",dept:"السيرولوجي"},
  {name:"عبدالرحمن صالح",dept:"ميكرو"},
  {name:"عبدالعزيز الزهراني",dept:"ميكرو"},
  {name:"نايف محمد",dept:"ميكرو"},
  {name:"محمد ناصر الطفيليات",dept:"طفيليات"}
];

var yr,mo,nd;

function lsv(){try{localStorage.setItem(LK,JSON.stringify({data:data,mv:document.getElementById("monthPicker").value,depts:DEPTS,dclr:DCLR}))}catch(e){}}
function lsl(){try{var d=localStorage.getItem(LK);if(!d)return;var p=JSON.parse(d);if(p.data)data=p.data;if(p.mv)document.getElementById("monthPicker").value=p.mv;
  if(p.depts){DEPTS.length=0;for(var i=0;i<p.depts.length;i++)DEPTS.push(p.depts[i]);
    // sync newDept select
    var sel=document.getElementById("newDept");sel.innerHTML="";
    for(var i=0;i<DEPTS.length;i++){var op=document.createElement("option");op.value=DEPTS[i];op.textContent=DEPTS[i];sel.appendChild(op)}}
  if(p.dclr){for(var k in p.dclr)DCLR[k]=p.dclr[k]}}catch(e){}}
function dim(m,y){return new Date(y,m,0).getDate()}
function dow(y,m,d){return new Date(y,m-1,d).getDay()}
function isWE(y,m,d){var w=dow(y,m,d);return w===5||w===6}
function scls(s){return "s-"+(s||"O")}
function toast(msg){var e=document.getElementById("toast");e.textContent=msg;e.style.display="block";setTimeout(function(){e.style.display="none"},2200)}

function ensureShifts(t){if(!t.shifts||t.shifts.length!==nd){t.shifts=[];for(var i=0;i<nd;i++)t.shifts.push("O")}}

function sortData(){
  var idx={};
  for(var i=0;i<DEPTS.length;i++) idx[DEPTS[i]]=i;
  data.sort(function(a,b){return (idx[a.dept]!==undefined?idx[a.dept]:99)-(idx[b.dept]!==undefined?idx[b.dept]:99)});
}

function render(){
  var val=document.getElementById("monthPicker").value;
  yr=val?parseInt(val.split("-")[0]):new Date().getFullYear();
  mo=val?parseInt(val.split("-")[1]):new Date().getMonth()+1;
  nd=dim(mo,yr);
  for(var i=0;i<data.length;i++) ensureShifts(data[i]);
  sortData();

  var h="<thead><tr>";
  h+='<th class="col-name">الاسم</th><th class="col-dept">القسم</th>';
  for(var d=1;d<=nd;d++){
    var w=dow(yr,mo,d),we=w===5||w===6,ab=DAYAR[w];
    h+='<th class="'+(we?"day-we-hdr":"")+'"><div>'+ab+'</div><div>'+d+'</div></th>';
  }
  h+='<th>إجمالي</th><th>مسؤولية</th><th>حذف</th></tr></thead><tbody>';

  var lastDept=null;
  for(var i=0;i<data.length;i++){
    var tech=data[i];
    var dc=DCLR[tech.dept]||"#64748b";
    var sep=lastDept!==null&&lastDept!==tech.dept;
    lastDept=tech.dept;
    var workDays=0;
    for(var x=0;x<tech.shifts.length;x++) if(tech.shifts[x]!=="O") workDays++;

    h+='<tr data-index="'+i+'" '+(sep?'class="dept-sep"':'')+' draggable="true">';
    h+='<td class="td-name" style="color:'+dc+';border-right:3px solid '+dc+'">'+tech.name+'</td>';
    h+='<td class="td-dept"><span class="dept-txt">'+tech.dept+'</span><select class="dept-sel" onchange="chDept('+i+',this.value)">';
    for(var j=0;j<DEPTS.length;j++) h+='<option value="'+DEPTS[j]+'"'+(tech.dept===DEPTS[j]?' selected':'')+'>'+DEPTS[j]+'</option>';
    h+='</select></td>';

    for(var di=0;di<nd;di++){
      var s=tech.shifts[di]||"O",we2=isWE(yr,mo,di+1),cls=scls(s);
      h+='<td'+(we2?' style="background:rgba(239,68,68,.08)"':'')+'>'+
         '<select class="shift-sel '+cls+'" onchange="setSh('+i+','+di+',this.value)" data-ti="'+i+'" data-di="'+di+'">';
      for(var k=0;k<SHIFTS.length;k++) h+='<option value="'+SHIFTS[k]+'"'+(s===SHIFTS[k]?' selected':'')+'>'+SHIFTS[k]+'</option>';
      h+='</select></td>';
    }

    h+='<td style="color:#22c55e;font-weight:700">'+workDays+'</td>';
    var note=tech.note||"";
    h+='<td><input type="text" value="'+note.replace(/"/g,"&quot;")+'" placeholder="مسؤولية..." onchange="setNote('+i+',this.value)" style="background:#0d1526;border:1px solid #1e3a5f;color:#94a3b8;border-radius:6px;padding:2px 6px;font-size:10px;width:90px;font-family:inherit"/></td>';
    h+='<td><button class="del-btn" onclick="delT('+i+')">&#x1F5D1;</button></td></tr>';
  }

  // Summary row
  h+='<tr style="background:#0a0f1e"><td colspan="2" style="color:#475569;font-size:11px;padding:6px">إجمالي العاملين</td>';
  for(var di=0;di<nd;di++){
    var working=0;
    for(var x=0;x<data.length;x++) if((data[x].shifts[di]||"O")!=="O") working++;
    var we3=isWE(yr,mo,di+1);
    var col=working>=15?"#22c55e":working>=10?"#f59e0b":"#ef4444";
    h+='<td style="color:'+col+';font-weight:700'+(we3?';background:rgba(239,68,68,.08)':'')+'">'+(working||0)+'</td>';
  }
  h+='<td colspan="3"></td></tr></tbody>';

  document.getElementById("mainTable").innerHTML=h;
  // Update print month title
  var MONTHS_AR=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  document.getElementById("printMonthTitle").textContent="جدول توزيع الورديات — "+MONTHS_AR[mo-1]+" "+yr;
  // بناء جدول المسؤوليات للطباعة
  var hasNotes=false;
  for(var i=0;i<data.length;i++) if(data[i].note&&data[i].note.trim()) hasNotes=true;
  var pn=document.getElementById("printNotes");
  if(hasNotes){
    var nh='<div style="font-size:11px;font-weight:700;margin-bottom:6px;color:#000">📋 جدول المسؤوليات</div>';
    nh+='<table style="width:100%;border-collapse:collapse;font-size:10px">';
    nh+='<tr style="background:#eee"><th style="border:1px solid #999;padding:4px 6px;text-align:right">الموظف</th><th style="border:1px solid #999;padding:4px 6px;text-align:right">القسم</th><th style="border:1px solid #999;padding:4px 6px;text-align:right">المسؤولية</th></tr>';
    for(var i=0;i<data.length;i++){
      if(data[i].note&&data[i].note.trim()){
        nh+='<tr><td style="border:1px solid #999;padding:3px 6px">'+data[i].name+'</td>';
        nh+='<td style="border:1px solid #999;padding:3px 6px">'+data[i].dept+'</td>';
        nh+='<td style="border:1px solid #999;padding:3px 6px;color:#c00;font-weight:600">'+data[i].note+'</td></tr>';
      }
    }
    nh+='</table>';
    pn.innerHTML=nh;
    pn.style.display="block";
  } else {
    pn.innerHTML=""; pn.style.display="none";
  }
  renderStats();
  enableDrag();
  lsv();
}

function renderStats(){
  var c={M:0,E:0,N:0,O:0};
  for(var i=0;i<data.length;i++) for(var j=0;j<data[i].shifts.length;j++){var s=data[i].shifts[j]||"O";c[s]=(c[s]||0)+1}
  var h="";
  var ks=["M","E","N","O"];
  for(var i=0;i<ks.length;i++){
    var k=ks[i];
    h+='<div class="stat-chip" style="background:'+SCLR[k]+'20;border:1px solid '+SCLR[k]+'40">'+
       '<span style="color:'+SCLR[k]+';font-weight:700">'+k+'</span>'+
       '<span style="color:#64748b;font-size:11px"> '+SLBL[k]+' '+c[k]+'</span></div>';
  }
  h+='<div class="stat-chip" style="background:#38bdf820;border:1px solid #38bdf840;margin-right:auto">'+
     '<span style="color:#38bdf8;font-weight:700">'+data.length+'</span>'+
     '<span style="color:#64748b;font-size:11px"> موظف</span></div>';
  document.getElementById("statsBar").innerHTML=h;
}

function setSh(i,di,v){
  data[i].shifts[di]=v;
  var s=document.querySelector('select[data-ti="'+i+'"][data-di="'+di+'"]');
  if(s) s.className="shift-sel "+scls(v);
  renderStats(); lsv();
}

function chDept(i,v){data[i].dept=v;render()}

function setNote(i,v){data[i].note=v;lsv()}

function delT(i){
  if(!confirm("حذف "+data[i].name+"؟")) return;
  data.splice(i,1); render(); toast("تم الحذف");
}

function addTech(){
  var name=document.getElementById("newName").value.trim();
  var dept=document.getElementById("newDept").value;
  if(!name){toast("أدخل الاسم");return}
  for(var i=0;i<data.length;i++) if(data[i].name===name){toast("الاسم موجود");return}
  var sh=[];for(var i=0;i<nd;i++) sh.push("O");
  data.push({name:name,dept:dept,shifts:sh});
  document.getElementById("newName").value="";
  render(); toast("تم إضافة "+name);
}

function closeModals(){
  document.getElementById("modalAddDept").style.display="none";
  document.getElementById("modalManage").style.display="none";
}

function showAddDept(){
  document.getElementById("inputNewDept").value="";
  document.getElementById("modalAddDept").style.display="flex";
}

function doAddDept(){
  var name=document.getElementById("inputNewDept").value.trim();
  var color=document.getElementById("inputNewDeptColor").value;
  if(!name){toast("أدخل اسم القسم");return}
  for(var i=0;i<DEPTS.length;i++) if(DEPTS[i]===name){toast("القسم موجود مسبقاً");return}
  DEPTS.push(name);
  DCLR[name]=color;
  // أضفه لقائمة الاختيار في الـ controls
  var sel=document.getElementById("newDept");
  var op=document.createElement("option");
  op.value=name; op.textContent=name;
  sel.appendChild(op);
  closeModals();
  lsv();
  toast("✅ تم إضافة قسم: "+name);
}

function showManage(){
  // ملء قائمة الموظفين
  var se=document.getElementById("selRenameEmp");
  se.innerHTML="";
  for(var i=0;i<data.length;i++){
    var op=document.createElement("option");
    op.value=i; op.textContent=data[i].name+" ("+data[i].dept+")";
    se.appendChild(op);
  }
  // ملء قائمة الأقسام
  var sd=document.getElementById("selRenameDept");
  sd.innerHTML="";
  for(var i=0;i<DEPTS.length;i++){
    var op=document.createElement("option");
    op.value=DEPTS[i]; op.textContent=DEPTS[i];
    sd.appendChild(op);
  }
  document.getElementById("inputRenameEmp").value="";
  document.getElementById("inputRenameDept").value="";
  document.getElementById("modalManage").style.display="flex";
}

function doRenameEmp(){
  var idx=parseInt(document.getElementById("selRenameEmp").value);
  var newName=document.getElementById("inputRenameEmp").value.trim();
  if(!newName){toast("أدخل الاسم الجديد");return}
  if(isNaN(idx)||idx<0||idx>=data.length){toast("اختر موظفاً");return}
  var old=data[idx].name;
  // تحديث في FIXED_NAMES داخل autoSchedule يعتمد على الاسم — نحدثه هنا
  data[idx].name=newName;
  lsv(); render();
  toast("✅ تم تغيير: "+old+" ← "+newName);
  showManage(); // تحديث القائمة
}

function doRenameDept(){
  var oldName=document.getElementById("selRenameDept").value;
  var newName=document.getElementById("inputRenameDept").value.trim();
  if(!newName){toast("أدخل الاسم الجديد");return}
  if(!oldName){toast("اختر قسماً");return}
  if(newName===oldName){toast("الاسم نفسه");return}
  for(var i=0;i<DEPTS.length;i++) if(DEPTS[i]===newName){toast("الاسم موجود");return}
  // تحديث DEPTS
  for(var i=0;i<DEPTS.length;i++) if(DEPTS[i]===oldName){DEPTS[i]=newName;break}
  // تحديث DCLR
  if(DCLR[oldName]){DCLR[newName]=DCLR[oldName];delete DCLR[oldName]}
  // تحديث بيانات الموظفين
  for(var i=0;i<data.length;i++) if(data[i].dept===oldName) data[i].dept=newName;
  // تحديث قائمة الـ controls
  var sel=document.getElementById("newDept");
  for(var i=0;i<sel.options.length;i++) if(sel.options[i].value===oldName){sel.options[i].value=newName;sel.options[i].textContent=newName;break}
  lsv(); render();
  toast("✅ تم تغيير: "+oldName+" ← "+newName);
  showManage();
}

function autoSchedule(){
  if(!confirm("توزيع تلقائي عادل — سيمسح الورديات الحالية. تأكيد؟")) return;

  var n = data.length;
  if(n === 0) return;

  // ══ الموظفون الثابتون — لا يدخلون الروتيشن أبداً ══
  var FIXED_NAMES = [
    "سعد علي",          // الكيمياء
    "سلطان محمد",       // الهيماتولوجي
    "مسفر عايض",        // السيرولوجي
    "فهد عبدالله",      // بنك الدم
    "عبدالرحمن صالح",   // ميكرو
    "محمد خلف"          // الاستقبال
  ];
  var FIXED_DEPTS = ["رئيس قسم","المدير الطبي"];

  function isFixed(i){
    for(var x=0;x<FIXED_NAMES.length;x++) if(data[i].name===FIXED_NAMES[x]) return true;
    for(var x=0;x<FIXED_DEPTS.length;x++) if(data[i].dept===FIXED_DEPTS[x]) return true;
    return false;
  }

  // ══ بناء pool من الموظفين القابلين للروتيشن فقط ══
  var pool = [];
  for(var i=0;i<n;i++) if(!isFixed(i)) pool.push(i);
  var pLen = pool.length;
  if(pLen === 0){ toast("لا يوجد موظفون للروتيشن"); return; }

  // مؤشر الدورة الشهرية
  var cycle = (yr * 12 + mo) - 1;

  // ══ اختيار فرق الشفتات بالدور ══
  // فريق E: موظفان + احتياطي
  var eIdx1   = pool[ cycle       % pLen ];
  var eIdx2   = pool[ (cycle+1)   % pLen ];
  var eSpare  = pool[ (cycle+2)   % pLen ];
  // فريق N: موظفان + احتياطي (لا يتداخلون مع E)
  var nIdx1   = pool[ (cycle+3)   % pLen ];
  var nIdx2   = pool[ (cycle+4)   % pLen ];
  var nSpare  = pool[ (cycle+5)   % pLen ];

  // ══ موظف الويكند — دورة أسبوعية ══
  // من pool فقط، مع استثناء من هو على E أو N هذا الشهر
  var wePool = [];
  for(var x=0;x<pLen;x++){
    var idx = pool[x];
    if(idx!==eIdx1&&idx!==eIdx2&&idx!==eSpare&&idx!==nIdx1&&idx!==nIdx2&&idx!==nSpare)
      wePool.push(idx);
  }
  // إذا ما في موظفون كافيون، نأخذ من الكل
  if(wePool.length===0) wePool=pool.slice();

  var weeksInMonth = Math.ceil(nd/7);
  var weWorkerByWeek = {};
  for(var wk=0;wk<weeksInMonth;wk++){
    weWorkerByWeek[wk] = wePool[ (cycle*weeksInMonth+wk) % wePool.length ];
  }

  // ══ بناء شفتات كل موظف ══
  for(var i=0;i<n;i++){
    data[i].shifts=[];

    // الثابتون: M أيام الأسبوع، O ويكند
    if(isFixed(i)){
      for(var d=1;d<=nd;d++){
        var w=dow(yr,mo,d);
        data[i].shifts.push(w===5||w===6?"O":"M");
      }
      continue;
    }

    var isE = (i===eIdx1||i===eIdx2||i===eSpare);
    var isN = (i===nIdx1||i===nIdx2||i===nSpare);

    // ── بناء أيام الشهر ──
    for(var d=1;d<=nd;d++){
      var w   = dow(yr,mo,d);
      var isWE = (w===5||w===6);
      var wk   = Math.floor((d-1)/7);
      var weW  = weWorkerByWeek[wk];
      var s;

      if(isE)      s = "E";
      else if(isN) s = "N";
      else if(i===weW && isWE) s = "M";
      else if(isWE) s = "O";
      else s = "M";

      data[i].shifts.push(s);
    }

    // ── 5+2 لموظفي E وN مع ضمان التغطية ──
    // كل موظف يأخذ يومين متتاليين بعد كل 5 أيام عمل
    // offset مختلف لكل موظف: pos=0→offset=0, pos=1→offset=2, pos=2→offset=4
    // الضمان: لا يوجد يوم يرتاح فيه أكثر من موظف واحد من نفس الفريق
    if(isE || isN){
      var team  = isE ? [eIdx1,eIdx2,eSpare] : [nIdx1,nIdx2,nSpare];
      var pos = 0;
      for(var t=0;t<team.length;t++) if(team[t]===i){ pos=t; break; }
      var offset = pos * 2; // 0, 2, 4 — يفصل بين دورات الراحة

      var counter = offset;
      for(var d=1;d<=nd;d++){
        var wd = dow(yr,mo,d);
        if(wd===5||wd===6) continue; // الويكند لا يدخل في حسبة الدورة
        counter++;
        // كل 7 أيام عمل: 5 عمل ثم 2 راحة
        if(((counter-1) % 7) >= 5){
          data[i].shifts[d-1]="O";
        }
      }
    }

    // ── قاعدة 5+2: كل 5 أيام عمل متتالية يأخذ يومي راحة ──
    // (للمسائي E والليلي N الراحة تعني O في نفس شفتهم)
    // نطبق على موظفي الروتيشن الصباحي فقط (لا E ولا N)
    if(!isE && !isN){
      var consec = 0;
      for(var d=1;d<=nd;d++){
        var w2=dow(yr,mo,d);
        var isWE2=(w2===5||w2===6);
        if(isWE2){ consec=0; continue; } // الويكند يكسر التسلسل
        if(data[i].shifts[d-1]!=="O"){
          consec++;
          if(consec>=5){
            // أعطه يومي راحة بعده
            var rest=0;
            for(var r=d+1;r<=nd&&rest<2;r++){
              var wr=dow(yr,mo,r);
              if(wr!==5&&wr!==6&&data[i].shifts[r-1]!=="O"){
                data[i].shifts[r-1]="O";
                rest++;
              }
            }
            consec=0;
          }
        } else {
          consec=0;
        }
      }
    }

    // ── قاعدة 24 ساعة: N لا يتبعه E أو M مباشرة ──
    for(var d=2;d<=nd;d++){
      var prev=data[i].shifts[d-2];
      var curr=data[i].shifts[d-1];
      var wCurr=dow(yr,mo,d);
      if(prev==="N" && (curr==="E"||curr==="M")){
        data[i].shifts[d-1]="O"; // إجازة إلزامية
      }
    }

    // ── تعويض الويكند: موظف الويكند يأخذ O تعويضي في نفس الأسبوع ══
    for(var d=1;d<=nd;d++){
      var w3=dow(yr,mo,d);
      var wk3=Math.floor((d-1)/7);
      if((w3===5||w3===6) && i===weWorkerByWeek[wk3]){
        // ابحث عن يوم عمل قبله في نفس الأسبوع
        var comp=false;
        for(var b=d-1;b>=1&&Math.floor((b-1)/7)===wk3&&!comp;b--){
          var wb=dow(yr,mo,b);
          if(wb!==5&&wb!==6&&data[i].shifts[b-1]!=="O"){
            data[i].shifts[b-1]="O"; comp=true;
          }
        }
        if(!comp){
          for(var f=d+1;f<=nd&&Math.floor((f-1)/7)===wk3&&!comp;f++){
            var wf=dow(yr,mo,f);
            if(wf!==5&&wf!==6&&data[i].shifts[f-1]!=="O"){
              data[i].shifts[f-1]="O"; comp=true;
            }
          }
        }
      }
    }
  }

  render();

  // ملخص التوزيع
  var MN=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  var en=data[eIdx1]?data[eIdx1].name.split(" ")[0]:"";
  var en2=data[eIdx2]?data[eIdx2].name.split(" ")[0]:"";
  var nn=data[nIdx1]?data[nIdx1].name.split(" ")[0]:"";
  var nn2=data[nIdx2]?data[nIdx2].name.split(" ")[0]:"";
  toast("✅ "+MN[mo-1]+" | E: "+en+"+"+en2+" | N: "+nn+"+"+nn2);
}

function exportCSV(){
  var MONTHS_AR=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  var monthName=MONTHS_AR[mo-1]+" "+yr;
  // Header info rows
  var csv="\uFEFF";
  csv+="تجمع عسير الصحي\n";
  csv+="مستشفى سبت العلايه العام\n";
  csv+="جدول توزيع الورديات — "+monthName+"\n\n";
  // Column headers
  var h=["الاسم","القسم","المسؤولية"];
  for(var d=1;d<=nd;d++){
    var w=dow(yr,mo,d),ab=DAYAR[w];
    h.push(ab+" "+d);
  }
  csv+=h.join(",")+"\n";
  for(var i=0;i<data.length;i++) csv+=[data[i].name,data[i].dept,data[i].note||""].concat(data[i].shifts).join(",")+"\n";
  // Footer
  csv+="\n";
  csv+="اعتماد / توقيع مشرف فنيي المختبر,,اعتماد / توقيع رئيس المختبر\n";
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download="ورديات_"+yr+"_"+String(mo).padStart(2,"0")+".csv"; a.click();
  URL.revokeObjectURL(url); toast("تم تصدير CSV");
}

function enableDrag(){
  var dragIdx=null;
  var rows=document.querySelectorAll("#mainTable tbody tr[data-index]");
  for(var i=0;i<rows.length;i++){
    (function(row){
      var nameTd=row.querySelector("td.td-name");
      if(!nameTd) return;
      row.addEventListener("dragstart",function(e){dragIdx=parseInt(row.dataset.index);setTimeout(function(){row.classList.add("dragging-row")},0);e.dataTransfer.effectAllowed="move"});
      row.addEventListener("dragend",function(){row.classList.remove("dragging-row");document.querySelectorAll(".drag-over").forEach(function(r){r.classList.remove("drag-over")})});
      row.addEventListener("dragover",function(e){e.preventDefault();document.querySelectorAll(".drag-over").forEach(function(r){r.classList.remove("drag-over")});row.classList.add("drag-over")});
      row.addEventListener("drop",function(e){e.preventDefault();var ti=parseInt(row.dataset.index);if(dragIdx===null||dragIdx===ti)return;var m=data.splice(dragIdx,1)[0];data.splice(ti,0,m);render()});
    })(rows[i]);
  }
}

window.addEventListener("DOMContentLoaded",function(){
  var now=new Date();
  document.getElementById("monthPicker").value=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  lsl(); render();
  document.getElementById("monthPicker").addEventListener("change",render);
});

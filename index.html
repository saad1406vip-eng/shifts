<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>ورديات المختبر</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1a2e">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{background:#0a0f1e;color:#fff;font-family:Arial;text-align:center}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #333;padding:6px}
.td-name{cursor:grab;background:#0ea5e9}
.dragging{position:fixed;background:#0ea5e9;color:#fff;padding:5px;border-radius:6px;z-index:999}
</style>
</head>

<body>

<h2>📊 جدول المختبر</h2>
<table id="mainTable"></table>

<script>
let data=[
{name:"علي عبدالخالق",dept:"رئيس قسم"},
{name:"الدكتور حاتم",dept:"المدير الطبي"},
{name:"فهد عبدالله",dept:"بنك الدم"}
];

function render(){
let html="<tr><th>الاسم</th><th>القسم</th></tr>";
data.forEach((t,i)=>{
html+=`<tr data-index="${i}">
<td class="td-name">${t.name}</td>
<td>${t.dept}</td>
</tr>`;
});
document.getElementById("mainTable").innerHTML=html;
drag();
}

function drag(){
let dragEl,startIndex;

document.querySelectorAll(".td-name").forEach((el,i)=>{
el.addEventListener("touchstart",()=>{
startIndex=i;
dragEl=el.cloneNode(true);
dragEl.classList.add("dragging");
document.body.appendChild(dragEl);
});

el.addEventListener("touchmove",(e)=>{
if(!dragEl)return;
let t=e.touches[0];
dragEl.style.top=t.clientY+"px";
dragEl.style.left=t.clientX+"px";
});

el.addEventListener("touchend",(e)=>{
if(!dragEl)return;
let t=e.changedTouches[0];
let elAt=document.elementFromPoint(t.clientX,t.clientY);
let row=elAt.closest("tr");
if(row){
let newIndex=parseInt(row.dataset.index);
let moved=data.splice(startIndex,1)[0];
data.splice(newIndex,0,moved);
}
dragEl.remove();
render();
});
});
}

render();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>نظام ورديات المختبر المطور</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0a0f1e;
  --panel-bg: #0d1a2e;
  --border-color: #1e3a5f30;
  --accent-blue: #38bdf8;
  --text-main: #e2e8f0;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{height:100%;background:var(--bg-dark);font-family:'Tajawal',sans-serif;direction:rtl;color:var(--text-main);overflow-x:hidden}

/* الهيدر والتحكم */
#header{background:linear-gradient(135deg,#0d1a2e,#0a0f1e);border-bottom:1px solid #1e3a5f;padding:15px;position:sticky;top:0;z-index:100}
#header h1{font-size:18px;font-weight:700;color:var(--accent-blue);margin-bottom:12px;text-align:center}
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center}
.controls input, .controls select{background:#0d1526;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px}

.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:0.3s}
.btn-green{background:#22c55e20;color:#22c55e;border:1px solid #22c55e50}
.btn-blue{background:#38bdf820;color:#38bdf8;border:1px solid #38bdf850}
.btn-amber{background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b50}

/* شريط الإحصائيات */
#statsBar{display:flex;gap:10px;padding:10px;overflow-x:auto;background:rgba(10,15,30,0.5);backdrop-filter:blur(5px)}
.stat-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;border-radius:12px;padding:6px 12px;font-size:12px;background:#1e3a5f20;border:1px solid #1e3a5f40}

/* الجدول */
#tableWrap{overflow:auto;padding:10px;-webkit-overflow-scrolling:touch}
#mainTable{border-collapse:separate;border-spacing:0;background:var(--panel-bg);font-size:12px;width:max-content;border-radius:12px;overflow:hidden}
#mainTable th{background:#1e293b;color:#94a3b8;padding:10px;border-bottom:1px solid var(--bg-dark);font-weight:600;text-align:center}

/* حل مشكلة السواد وتثبيت الأعمدة */
.sticky-col{position:sticky;right:0;z-index:5;background:#0d1a2e !important}
.sticky-dept{position:sticky;right:120px;z-index:5;background:#0d1a2e !important}

#mainTable td{border:1px solid var(--border-color);padding:6px;text-align:center}
.td-name{min-width:120px;text-align:right !important;font-weight:700;cursor:pointer;padding-right:12px !important}
.td-name:hover{text-decoration:underline;color:var(--accent-blue) !important}

/* ألوان الشفتات */
.shift-sel{background:transparent;border:none;font-size:12px;font-weight:800;width:38px;padding:4px;border-radius:6px;text-align:center;cursor:pointer}
.s-M{color:#0ea5e9;background:rgba(14,165,233,.15)}
.s-E{color:#f59e0b;background:rgba(245,158,11,.15)}
.s-N{color:#a78bfa;background:rgba(139,92,246,.15)}
.s-O{color:#94a3b8;background:rgba(148,163,184,.08)}

.day-we{background:rgba(239,68,68,.05) !important;color:#f87171}
.dept-sel{background:#1e293b;border:none;color:#e2e8f0;border-radius:4px;font-size:11px;padding:4px}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0ea5e9;color:white;padding:10px 25px;border-radius:30px;z-index:1000;display:none;box-shadow:0 5px 15px rgba(0,0,0,0.3)}

@media print{
  #header, #statsBar, .del-btn, .dept-sel{display:none !important}
  body{background:white;color:black}
  #mainTable{width:100%;font-size:10px}
  #mainTable th, #mainTable td{border:1px solid #ccc;color:black !important;background:transparent !important;position:static !important}
}
</style>
</head>
<body>

<div id="header">
  <h1>🏥 نظام ورديات المختبر</h1>
  <div class="controls">
    <input type="month" id="monthPicker"/>
    <button class="btn btn-green" onclick="addTech()">➕ إضافة فني</button>
    <button class="btn btn-amber" onclick="autoSchedule()">⚙️ توزيع تلقائي</button>
    <button class="btn btn-blue" onclick="window.print()">🖨️ طباعة</button>
    <button class="btn" style="background:#1e293b; color:white" onclick="exportCSV()">📥 CSV</button>
  </div>
</div>

<div id="statsBar"></div>

<div id="tableWrap">
  <table id="mainTable"></table>
</div>

<div id="toast"></div>

<script>
let DEPTS=["رئيس قسم","المدير الطبي","بنك الدم","الاستقبال","الكيمياء","الهيماتولوجي","السيرولوجي","ميكرو","طفيليات","الانسجة والسموم"];
let SHIFTS=["M","E","N","O"];
let SCLR={M:"#0ea5e9",E:"#f59e0b",N:"#a78bfa",O:"#64748b"};
let DCLR={"رئيس قسم":"#ef4444","المدير الطبي":"#f97316","بنك الدم":"#ec4899","الاستقبال":"#14b8a6","الكيمياء":"#0ea5e9","الهيماتولوجي":"#8b5cf6","السيرولوجي":"#22c55e","ميكرو":"#f59e0b","طفيليات":"#06b6d4","الانسجة والسموم":"#84cc16"};
let DAYAR=["أح","إث","ثل","أر","خم","جم","سب"];

let data=[
  {name:"علي عبدالخالق",dept:"رئيس قسم"},
  {name:"فهد عبدالله",dept:"بنك الدم"},
  {name:"محمد خلف",dept:"الاستقبال"},
  {name:"سعد علي",dept:"الكيمياء"},
  {name:"عبدالرحمن صالح",dept:"ميكرو"}
];

let yr, mo, nd;

function lsv(){ localStorage.setItem("lab_v3", JSON.stringify({data, mv:document.getElementById("monthPicker").value})); }
function lsl(){
  let stored = localStorage.getItem("lab_v3");
  if(stored){
    let p = JSON.parse(stored);
    data = p.data;
    document.getElementById("monthPicker").value = p.mv;
  }
}

function render(){
  let val = document.getElementById("monthPicker").value;
  yr = val ? parseInt(val.split("-")[0]) : new Date().getFullYear();
  mo = val ? parseInt(val.split("-")[1]) : new Date().getMonth()+1;
  nd = new Date(yr, mo, 0).getDate();

  let h = `<thead><tr><th class="sticky-col">الاسم</th><th class="sticky-dept">القسم</th>`;
  for(let d=1; d<=nd; d++){
    let w = new Date(yr, mo-1, d).getDay();
    let we = (w===5 || w===6);
    h += `<th class="${we?'day-we':''}"><div>${DAYAR[w]}</div>${d}</th>`;
  }
  h += `<th>العمل</th><th>حذف</th></tr></thead><tbody>`;

  data.forEach((tech, i) => {
    if(!tech.shifts || tech.shifts.length !== nd) tech.shifts = Array(nd).fill("O");
    let workDays = tech.shifts.filter(s => s !== "O").length;
    let dc = DCLR[tech.dept] || "#64748b";

    h += `<tr draggable="true" ondragstart="drag(${i})" ondragover="allowDrop(event)" ondrop="drop(${i})">`;
    h += `<td class="td-name sticky-col" style="color:${dc}; border-right:4px solid ${dc}" onclick="renameTech(${i})">${tech.name}</td>`;
    h += `<td class="td-dept sticky-dept"><select class="dept-sel" onchange="chDept(${i},this.value)">`;
    DEPTS.forEach(d => h += `<option ${tech.dept===d?'selected':''}>${d}</option>`);
    h += `</select></td>`;

    for(let di=0; di<nd; di++){
      let s = tech.shifts[di] || "O";
      let w = new Date(yr, mo-1, di+1).getDay();
      h += `<td class="${(w===5||w===6)?'day-we':''}">
            <select class="shift-sel s-${s}" onchange="setSh(${i},${di},this.value)">`;
      SHIFTS.forEach(sh => h += `<option value="${sh}" ${s===sh?'selected':''}>${sh}</option>`);
      h += `</select></td>`;
    }
    h += `<td style="font-weight:bold; color:#22c55e">${workDays}</td>`;
    h += `<td><button class="btn" style="padding:2px 5px; color:#ef4444" onclick="delT(${i})">🗑</button></td></tr>`;
  });

  document.getElementById("mainTable").innerHTML = h;
  renderStats();
  lsv();
}

function renameTech(i) {
  let newName = prompt("أدخل الاسم الجديد للموظف:", data[i].name);
  if(newName && newName.trim() !== "") {
    data[i].name = newName.trim();
    render();
    toast("تم تحديث الاسم بنجاح");
  }
}

function setSh(i, di, v){ data[i].shifts[di]=v; render(); }
function chDept(i, v){ data[i].dept=v; render(); }
function delT(i){ if(confirm("حذف الموظف؟")){ data.splice(i,1); render(); } }

function addTech(){
  let n = prompt("اسم الموظف الجديد:");
  if(n){
    data.push({name:n, dept:DEPTS[0], shifts:Array(nd).fill("O")});
    render();
  }
}

function autoSchedule(){
  if(!confirm("سيتم إعادة توزيع الورديات بشكل تلقائي، هل أنت متأكد؟")) return;
  data.forEach((tech, i) => {
    tech.shifts = [];
    for(let d=1; d<=nd; d++){
      let w = new Date(yr, mo-1, d).getDay();
      if(w===5 || w===6) tech.shifts.push("O");
      else {
        let pattern = ["M", "E", "N"];
        tech.shifts.push(pattern[(i + d) % 3]);
      }
    }
  });
  render();
  toast("تم التوزيع التلقائي");
}

function renderStats(){
  let c={M:0,E:0,N:0,O:0};
  data.forEach(t => t.shifts.forEach(s => c[s]++));
  let h = Object.keys(c).map(k => `
    <div class="stat-chip">
      <b style="color:${SCLR[k]}">${k}</b> <span>${c[k]}</span>
    </div>
  `).join("");
  document.getElementById("statsBar").innerHTML = h + `<div class="stat-chip"><b>العدد:</b> ${data.length}</div>`;
}

function toast(m){
  let t=document.getElementById("toast");
  t.textContent=m; t.style.display="block";
  setTimeout(()=>t.style.display="none", 2000);
}

function exportCSV(){
  let csv = "\uFEFFالاسم,القسم," + Array.from({length:nd},(_,i)=>i+1).join(",") + "\n";
  data.forEach(t => csv += `${t.name},${t.dept},${t.shifts.join(",")}\n`);
  let blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `جدول_${mo}_${yr}.csv`;
  link.click();
}

// السحب والإفلات
let dragIdx;
function drag(i){ dragIdx=i; }
function allowDrop(e){ e.preventDefault(); }
function drop(i){
  let item = data.splice(dragIdx, 1)[0];
  data.splice(i, 0, item);
  render();
}

window.onload = () => {
  let now = new Date();
  document.getElementById("monthPicker").value = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
  lsl();
  render();
  document.getElementById("monthPicker").onchange = render;
};
</script>
</body>
</html>

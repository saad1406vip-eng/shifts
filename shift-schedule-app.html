<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:#060d1a;height:100%;overflow:hidden;font-family:'Tajawal','Cairo',Arial,sans-serif;direction:rtl;color:#e2e8f0}
#root{position:fixed;top:0;right:0;bottom:0;left:0;overflow:hidden;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
::-webkit-scrollbar{display:none}
input,select,button{font-family:inherit;outline:none}
button{cursor:pointer;border:none}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}
/* Bottom sheet */
.sheet-overlay{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#111827;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px}
.pill{width:36px;height:4px;background:#334155;border-radius:2px;margin:0 auto 16px}
/* Toast */
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:#0d1a2e;border:1px solid #0ea5e9;border-radius:20px;padding:8px 20px;font-size:13px;color:#38bdf8;z-index:999;white-space:nowrap;display:none}
/* Screens */
.screen{position:fixed;top:0;right:0;bottom:0;left:0;background:#060d1a;display:flex;flex-direction:column;max-width:480px;margin:0 auto;z-index:10}

<body>
<div id="root"></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════
const MONTHS=[{n:"يناير",d:31},{n:"فبراير",d:28},{n:"مارس",d:31},{n:"أبريل",d:30},{n:"مايو",d:31},{n:"يونيو",d:30},{n:"يوليو",d:31},{n:"أغسطس",d:31},{n:"سبتمبر",d:30},{n:"أكتوبر",d:31},{n:"نوفمبر",d:30},{n:"ديسمبر",d:31}];
const EMP0=[{id:1,name:"علي عبدالخالق",dept:"مدير"},{id:2,name:"الدكتور حاتم",dept:"طبي/أخصائي"},{id:3,name:"فهد عبدالله",dept:"بنك الدم"},{id:4,name:"محمد سعد",dept:"بنك الدم"},{id:5,name:"نايف محبوب",dept:"بنك الدم"},{id:6,name:"نايف محمد",dept:"الاستقبال"},{id:7,name:"سعد علي",dept:"الكيمياء"},{id:8,name:"بدر محمد",dept:"الكيمياء"},{id:9,name:"محمد صالح",dept:"الكيمياء"},{id:10,name:"منصور محمد",dept:"الكيمياء"},{id:11,name:"سلطان محمد",dept:"الهيماتولوجي"},{id:12,name:"حسام سعيد",dept:"الهيماتولوجي"},{id:13,name:"سعد عيد",dept:"الهيماتولوجي"},{id:14,name:"مسفر عايض",dept:"السيرولوجي"},{id:15,name:"محمد ناصر",dept:"السيرولوجي"},{id:16,name:"محمد سهلان",dept:"السيرولوجي"},{id:17,name:"عبدالرحمن صالح",dept:"ميكرو"},{id:18,name:"عبدالعزيز الزهراني",dept:"ميكرو"},{id:19,name:"محمد خلف",dept:"ميكرو"}];
const DEPT0=["مدير","طبي/أخصائي","بنك الدم","الاستقبال","الكيمياء","الهيماتولوجي","السيرولوجي","ميكرو"];
const RS=["M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","L L L L L O O L L L L L O O L L L L L O O L L L L L O O L L L","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","L L L L L O O L L L L L O O L L L L L O O L L L L L O O L L L","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","N N N N N O O N N N N N O O N N N N N O O N N N N N O O N N N","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","O O O O O O O O O O O M O O O O O M O O O O O M O O O O O M O","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M","L N O L N O O N O L N O O O O L N O L O O L N O L N O O N O L","M M M M M O O M M M M M O O M M M M M O O M M M M M O O M M M"];
const VLD=new Set(["M","L","N","O"]);
const sf=v=>(v&&VLD.has(v))?v:"M";
const DAA=["أح","إث","ثل","أر","خم","جم","سب"];
const gdi=(y,m,d)=>{const w=new Date(y,m,d).getDay();return{abbr:DAA[w],we:w===5||w===6}};
const SC={M:{lbl:"صباحي",clr:"#0ea5e9",bg:"rgba(14,165,233,.15)"},L:{lbl:"مسائي",clr:"#f59e0b",bg:"rgba(245,158,11,.15)"},N:{lbl:"ليلي",clr:"#a78bfa",bg:"rgba(139,92,246,.15)"},O:{lbl:"إجازة",clr:"#64748b",bg:"rgba(100,116,139,.08)"}};
const CYC=["M","L","N","O"];
const PAL=["#ef4444","#f97316","#ec4899","#14b8a6","#0ea5e9","#8b5cf6","#22c55e","#f59e0b","#e11d48","#06b6d4","#a855f7","#84cc16"];
let _uid=20;

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const LK="shifts_v4";
const lsv=d=>{try{localStorage.setItem(LK,JSON.stringify(d))}catch(e){}};
const lsl=()=>{try{const d=localStorage.getItem(LK);return d?JSON.parse(d):null}catch(e){return null}};

function initState(){
  const sv=lsl();
  if(sv&&sv.nextId)_uid=sv.nextId;
  const bdc=ds=>{const m={};ds.forEach((d,i)=>{m[d]=PAL[i%PAL.length]});return m};
  const bis=()=>{const s={};EMP0.forEach((e,i)=>{s[`0-${e.id}`]=RS[i].split(" ").map(sf)});return s};
  return {
    year: sv?.year??2025, mIdx: sv?.mIdx??0,
    store: sv?.store??bis(),
    emps: sv?.employees??JSON.parse(JSON.stringify(EMP0)),
    depts: sv?.depts??[...DEPT0],
    dc: sv?.deptColors??bdc(DEPT0),
    screen:"main", selDept:null, selEmp:null,
    editMode:false, history:[],
    showAddEmp:false, showManage:false, showMonthPicker:false,
    confirmDel:null, imgURL:null,
    newName:"", newDept:"", newDeptCustom:"", newDeptName:""
  };
}

let S=initState();
let _toastTimer=null;

function save(){lsv({year:S.year,mIdx:S.mIdx,store:S.store,employees:S.emps,depts:S.depts,deptColors:S.dc,nextId:_uid})}

function setState(patch){
  Object.assign(S,patch);
  save();
  render();
}

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.style.display="block";
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{el.style.display="none"},2200);
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function getRow(empId){
  const key=`${S.mIdx}-${empId}`,raw=S.store[key];
  const nd=MONTHS[S.mIdx].d;
  return Array.from({length:nd},(_,i)=>sf(raw?raw[i]:undefined));
}
function getShift(empId,di){return sf(getRow(empId)[di])}
function empStats(empId){const c={M:0,L:0,N:0,O:0};getRow(empId).forEach(s=>{c[s]=(c[s]||0)+1});return c}
function sortedEmps(){
  const ord=Object.fromEntries(S.depts.map((d,i)=>[d,i]));
  return [...S.emps].sort((a,b)=>{const dd=(ord[a.dept]??99)-(ord[b.dept]??99);return dd||a.id-b.id});
}
function deptColor(d){return S.dc[d]||"#64748b"}

function cycleShift(empId,di){
  if(!S.editMode)return;
  const cur=getShift(empId,di),next=CYC[(CYC.indexOf(cur)+1)%CYC.length],key=`${S.mIdx}-${empId}`;
  const nd=MONTHS[S.mIdx].d;
  const newStore={...S.store};
  const row=Array.from({length:nd},(_,i)=>sf(S.store[key]?S.store[key][i]:undefined));
  row[di]=next;
  newStore[key]=row;
  const newHist=[...S.history,{store:JSON.parse(JSON.stringify(S.store))}];
  setState({store:newStore,history:newHist});
}

function undo(){
  if(!S.history.length)return;
  const prev=S.history[S.history.length-1];
  setState({store:prev.store,history:S.history.slice(0,-1)});
}

// ═══════════════════════════════════════════
//  DOM HELPERS
// ═══════════════════════════════════════════
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v)}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v)}
    else if(k==="class"){e.className=v}
    else if(k==="disabled"){if(v)e.disabled=true}
    else{e.setAttribute(k,v)}
  }
  for(const c of children){
    if(c==null||c===false)continue;
    if(typeof c==="string"||typeof c==="number"){e.appendChild(document.createTextNode(String(c)))}
    else if(c instanceof Node){e.appendChild(c)}
  }
  return e;
}
const div=(...a)=>el("div",...a);
const span=(...a)=>el("span",...a);
const btn=(...a)=>el("button",...a);
const inp=(...a)=>el("input",...a);
const sel=(...a)=>el("select",...a);
const opt=(v,t,sel)=>{const o=el("option",{value:v},[t]);if(sel)o.selected=true;return o};

// ═══════════════════════════════════════════
//  CANVAS IMAGE EXPORT
// ═══════════════════════════════════════════
function mkImg(empId){
  const emp=S.emps.find(e=>e.id===empId),row=getRow(empId),stats=empStats(empId),dclr=deptColor(emp.dept);
  const nd=MONTHS[S.mIdx].d,mo=MONTHS[S.mIdx];
  const CL=52,CO=7,RO=Math.ceil(nd/CO),PD=20,HD=116,LG=44,W=CO*CL+PD*2,H=HD+RO*CL+PD+LG;
  const cv=document.createElement("canvas");cv.width=W*2;cv.height=H*2;
  const cx=cv.getContext("2d");cx.scale(2,2);
  const CC={M:{t:"#38bdf8",b:"rgba(14,165,233,.13)",s:"rgba(14,165,233,.4)"},L:{t:"#fbbf24",b:"rgba(245,158,11,.13)",s:"rgba(245,158,11,.4)"},N:{t:"#a78bfa",b:"rgba(139,92,246,.15)",s:"rgba(139,92,246,.4)"},O:{t:"#64748b",b:"rgba(100,116,139,.08)",s:"rgba(100,116,139,.2)"}};
  const rr=(x,y,w,h,r)=>{cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath()};
  cx.fillStyle="#060d1a";cx.fillRect(0,0,W,H);cx.fillStyle="#0d1a2e";cx.fillRect(0,0,W,HD);cx.fillStyle=dclr;cx.fillRect(0,0,4,HD);
  cx.fillStyle="#f1f5f9";cx.font="bold 16px Arial";cx.textAlign="right";cx.fillText(emp.name,W-PD,34);
  cx.fillStyle=dclr;cx.font="12px Arial";cx.fillText(emp.dept,W-PD,52);cx.fillStyle="#475569";cx.font="11px Arial";cx.fillText(`${mo.n} ${S.year}`,W-PD,68);
  const cw=(W-PD*2)/4-4;["M","L","N","O"].forEach((k,i)=>{const x=PD+i*(cw+4),y=78;cx.fillStyle=CC[k].b;rr(x,y,cw,22,6);cx.fill();cx.strokeStyle=CC[k].s;cx.lineWidth=1;rr(x,y,cw,22,6);cx.stroke();cx.fillStyle=CC[k].t;cx.font="bold 12px Arial";cx.textAlign="center";cx.fillText(`${SC[k].lbl[0]} ${stats[k]}`,x+cw/2,y+15)});
  for(let i=0;i<nd;i++){const col=i%CO,ri=Math.floor(i/CO),x=PD+col*CL,y=HD+PD/2+ri*CL,cw2=CL-4,s=row[i],c=CC[s]||CC.M,dn=i+1,{abbr,we}=gdi(S.year,S.mIdx,dn);cx.fillStyle=we?"rgba(239,68,68,.10)":c.b;rr(x,y,cw2,cw2,8);cx.fill();cx.strokeStyle=we?"rgba(239,68,68,.35)":c.s;cx.lineWidth=1.2;rr(x,y,cw2,cw2,8);cx.stroke();cx.fillStyle=we?"#f87171":"#334155";cx.font="bold 8px Arial";cx.textAlign="center";cx.fillText(abbr,x+cw2/2,y+12);cx.fillStyle=we?"#fca5a5":"#64748b";cx.font="9px Arial";cx.fillText(dn,x+cw2/2,y+23);cx.fillStyle=(we&&s==="O")?"#f87171":c.t;cx.font="bold 17px Arial";cx.fillText(s==="O"?"·":s,x+cw2/2,y+42)}
  cx.fillStyle="#1e3a5f";cx.fillRect(0,H-2,W,2);
  return cv.toDataURL("image/png");
}

// ═══════════════════════════════════════════
//  COMMON UI COMPONENTS
// ═══════════════════════════════════════════
function ShiftCell(empId,di,size=36){
  const s=getShift(empId,di),c=SC[s]||SC.M,{we}=gdi(S.year,S.mIdx,di+1);
  const d=div({style:{width:size+"px",height:size+"px",display:"flex",alignItems:"center",justifyContent:"center",
    borderRadius:"8px",background:we&&s==="O"?"rgba(239,68,68,.10)":c.bg,color:c.clr,
    fontSize:(size>=30?"11":"10")+"px",fontWeight:"700",flexShrink:"0",userSelect:"none",
    border:S.editMode?`1.5px solid ${c.clr}90`:we?"1px solid rgba(239,68,68,.3)":"1px solid transparent",
    cursor:S.editMode?"pointer":"default"}},[s==="O"?"·":s]);
  if(S.editMode)d.addEventListener("click",()=>cycleShift(empId,di));
  return d;
}

function DayHeader(dayN){
  const{abbr,we}=gdi(S.year,S.mIdx,dayN);
  return div({style:{textAlign:"center",padding:"2px 0",borderRadius:"6px",
    background:we?"rgba(239,68,68,.07)":"transparent",minWidth:"38px"}},[
    div({style:{fontSize:"8px",color:we?"#f87171":"#334155",fontWeight:we?"700":"400",lineHeight:"1.2"}},[abbr]),
    div({style:{fontSize:"10px",color:we?"#f87171":"#475569",fontWeight:we?"700":"400"}},[String(dayN)])
  ]);
}

function Sheet(title,content,onClose){
  const overlay=div({class:"sheet-overlay",onClick:onClose},[]);
  const sheet=div({class:"sheet"},[
    div({class:"pill"},[]),
    div({style:{fontSize:"16px",fontWeight:"700",color:"#38bdf8",marginBottom:"16px"}},[title]),
    ...content
  ]);
  sheet.addEventListener("click",e=>e.stopPropagation());
  overlay.appendChild(sheet);
  return overlay;
}

// ═══════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════
function renderEmpScreen(){
  const emp=S.emps.find(e=>e.id===S.selEmp);
  if(!emp)return null;
  const dclr=deptColor(emp.dept),row=getRow(emp.id),stats=empStats(emp.id);
  const nd=MONTHS[S.mIdx].d,mo=MONTHS[S.mIdx];
  const scr=div({class:"screen"},[]);

  // Image modal
  if(S.imgURL){
    const modal=div({style:{position:"fixed",top:"0",right:"0",bottom:"0",left:"0",background:"rgba(0,0,0,.88)",zIndex:"300",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px"}},[
      div({style:{background:"#0d1a2e",borderRadius:"16px",overflow:"hidden",maxWidth:"420px",width:"100%"}},[
        div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"12px 16px",borderBottom:"1px solid #1e3a5f"}},[
          span({style:{color:"#f1f5f9",fontWeight:"700",fontSize:"14px"}},["جدول "+emp.name]),
          btn({style:{background:"none",border:"1px solid #1e3a5f",color:"#64748b",borderRadius:"8px",
            padding:"4px 12px",fontSize:"13px"},onClick:()=>setState({imgURL:null})},["✕"])
        ]),
        el("img",{src:S.imgURL,style:{width:"100%",display:"block"}},[]),
        div({style:{padding:"10px 16px",background:"#060d1a",textAlign:"center",
          fontSize:"13px",color:"#38bdf8",fontWeight:"700"}},["📲 اضغط على الصورة مطولاً للحفظ"])
      ])
    ]);
    scr.appendChild(modal);
  }

  // Header
  const hdr=div({style:{background:"#0d1a2e",padding:"52px 20px 16px",borderBottom:"1px solid #1e3a5f",
    borderRight:`3px solid ${dclr}`,flexShrink:"0"}},[
    div({style:{display:"flex",alignItems:"center",gap:"12px"}},[
      btn({style:{background:"#1e3a5f",color:"#38bdf8",width:"36px",height:"36px",borderRadius:"10px",fontSize:"18px"},
        onClick:()=>setState({screen:"main",imgURL:null})},["‹"]),
      div({style:{flex:"1"}},[
        div({style:{fontSize:"17px",fontWeight:"700",color:"#f1f5f9"}},[emp.name]),
        div({style:{fontSize:"12px",color:dclr,marginTop:"2px"}},[emp.dept])
      ]),
      btn({style:{padding:"7px 14px",borderRadius:"10px",background:"#0ea5e920",border:"1px solid #0ea5e960",
        color:"#38bdf8",fontSize:"12px",fontWeight:"700"},onClick:()=>setState({imgURL:mkImg(emp.id)})},["🖼 حفظ"]),
      ...(S.editMode?[div({style:{fontSize:"11px",color:"#f59e0b",background:"#f59e0b15",
        padding:"3px 10px",borderRadius:"20px",border:"1px solid #f59e0b40"}},["تعديل"])]:[] )
    ]),
    // Stats
    div({style:{display:"flex",gap:"8px",marginTop:"14px"}},
      Object.entries(SC).map(([k,v])=>div({style:{flex:"1",background:v.bg,borderRadius:"10px",
        padding:"8px 4px",textAlign:"center",border:`1px solid ${v.clr}30`}},[
        div({style:{fontSize:"18px",fontWeight:"700",color:v.clr}},[String(stats[k])]),
        div({style:{fontSize:"10px",color:"#475569",marginTop:"1px"}},[v.lbl])
      ]))
    )
  ]);
  scr.appendChild(hdr);

  // Grid
  const grid=div({class:"scroll",style:{flex:"1",padding:"16px 16px 100px"}},[
    div({style:{fontSize:"12px",color:"#475569",marginBottom:"10px"}},[`${mo.n} ${S.year} — ${nd} يوم`])
  ]);
  const weeks=Math.ceil(nd/7);
  for(let wi=0;wi<weeks;wi++){
    const row2=div({style:{display:"flex",gap:"5px",marginBottom:"5px"}},[]);
    for(let di=0;di<7;di++){
      const dn=wi*7+di+1;
      if(dn>nd){row2.appendChild(div({style:{flex:"1",minWidth:"0"}}));continue}
      const s=getShift(emp.id,dn-1),c=SC[s]||SC.M,{abbr,we}=gdi(S.year,S.mIdx,dn);
      const cell=div({style:{flex:"1",minWidth:"0",minHeight:"0",display:"flex",
        flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:"10px",
        background:we&&s==="O"?"rgba(239,68,68,.10)":c.bg,userSelect:"none",
        border:S.editMode?`1.5px solid ${c.clr}90`:we?"1px solid rgba(239,68,68,.3)":"1px solid transparent",
        cursor:S.editMode?"pointer":"default"}},[
        div({style:{fontSize:"8px",color:we?"#f87171":"#334155",fontWeight:"700",lineHeight:"1",marginBottom:"1px"}},[abbr]),
        div({style:{fontSize:"9px",color:we?"#fca5a5":"#475569",marginBottom:"2px"}},[String(dn)]),
        div({style:{fontSize:"14px",fontWeight:"700",color:c.clr}},[s==="O"?"·":s])
      ]);
      const empIdCopy=emp.id,diCopy=dn-1;
      if(S.editMode)cell.addEventListener("click",()=>cycleShift(empIdCopy,diCopy));
      row2.appendChild(cell);
    }
    grid.appendChild(row2);
  }
  scr.appendChild(grid);

  // Bottom bar
  const bar=div({style:{position:"sticky",bottom:"0",background:"#0d1a2e",
    borderTop:"1px solid #1e3a5f",padding:"10px 16px 24px",display:"flex",gap:"10px"}},[
    btn({style:{flex:"1",padding:"12px",borderRadius:"12px",
      border:`1.5px solid #f59e0b60`,background:S.editMode?"#f59e0b":"#0d1526",
      color:S.editMode?"#0a0f1e":"#f59e0b",fontWeight:"700",fontSize:"14px"},
      onClick:()=>{setState({editMode:!S.editMode});if(S.editMode)toast("✅ تم الحفظ")}},
      [S.editMode?"💾 حفظ":"✏️ تعديل"]),
    ...(S.editMode&&S.history.length?[btn({style:{padding:"12px 20px",borderRadius:"12px",
      border:"1px solid #1e3a5f",background:"#0d1526",color:"#94a3b8",fontSize:"14px"},onClick:undo},["↩"])]:[] ),
    btn({style:{padding:"12px 20px",borderRadius:"12px",border:"1px solid #0ea5e960",
      background:"#0ea5e915",color:"#38bdf8",fontSize:"14px",fontWeight:"700"},
      onClick:()=>setState({imgURL:mkImg(emp.id)})},["🖼 صورة"])
  ]);
  scr.appendChild(bar);
  return scr;
}

function renderDeptScreen(){
  const dept=S.selDept,dclr=deptColor(dept);
  const dEmps=sortedEmps().filter(e=>e.dept===dept);
  const nd=MONTHS[S.mIdx].d,mo=MONTHS[S.mIdx];
  const DAYS=Array.from({length:nd},(_,i)=>i+1);
  const scr=div({class:"screen"},[]);

  const hdr=div({style:{background:"#0d1a2e",padding:"52px 20px 16px",borderBottom:"1px solid #1e3a5f",flexShrink:"0"}},[
    div({style:{display:"flex",alignItems:"center",gap:"12px"}},[
      btn({style:{background:"#1e3a5f",color:"#38bdf8",width:"36px",height:"36px",borderRadius:"10px",fontSize:"18px"},
        onClick:()=>setState({screen:"main"})},["‹"]),
      div({style:{flex:"1"}},[
        div({style:{display:"flex",alignItems:"center",gap:"8px"}},[
          span({style:{width:"10px",height:"10px",borderRadius:"50%",background:dclr,display:"inline-block"}}),
          span({style:{fontSize:"17px",fontWeight:"700",color:"#f1f5f9"}},[dept])
        ]),
        div({style:{fontSize:"12px",color:"#475569",marginTop:"2px"}},[`${dEmps.length} موظفين · ${mo.n} ${S.year}`])
      ]),
      btn({style:{padding:"6px 14px",borderRadius:"10px",border:`1px solid #f59e0b60`,
        background:S.editMode?"#f59e0b":"#0d1526",color:S.editMode?"#0a0f1e":"#f59e0b",fontWeight:"700",fontSize:"12px"},
        onClick:()=>{setState({editMode:!S.editMode});if(S.editMode)toast("✅ تم الحفظ")}},
        [S.editMode?"💾":"✏️"])
    ])
  ]);
  scr.appendChild(hdr);

  const wrap=div({class:"scrollx",style:{flex:"1",padding:"14px 0 80px"}},[]);
  const inner=div({style:{minWidth:(nd*42+170)+"px",padding:"0 16px"}},[]);

  // Day header row
  const dayHdrRow=div({style:{display:"grid",gridTemplateColumns:`160px repeat(${nd},38px)`,
    gap:"3px",marginBottom:"4px",paddingBottom:"4px",borderBottom:"1px solid rgba(30,58,95,.3)"}},[
    div({style:{fontSize:"11px",color:"#334155",padding:"4px 6px"}},["الموظف"]),
    ...DAYS.map(d=>DayHeader(d))
  ]);
  inner.appendChild(dayHdrRow);

  // Employee rows
  dEmps.forEach(emp=>{
    const row=div({style:{display:"grid",gridTemplateColumns:`160px repeat(${nd},38px)`,
      gap:"3px",marginBottom:"4px",alignItems:"center"}},[]);
    const nameCl=div({style:{fontSize:"13px",color:"#cbd5e1",padding:"4px 6px",
      cursor:S.editMode?"default":"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[emp.name]);
    if(!S.editMode)nameCl.addEventListener("click",()=>setState({screen:"emp",selEmp:emp.id}));
    row.appendChild(nameCl);
    DAYS.forEach((_,i)=>row.appendChild(ShiftCell(emp.id,i)));
    inner.appendChild(row);
  });
  wrap.appendChild(inner);
  scr.appendChild(wrap);
  return scr;
}

function renderMainScreen(){
  const mo=MONTHS[S.mIdx];
  const DAYS=Array.from({length:mo.d},(_,i)=>i+1);
  const sEmps=sortedEmps();
  const root2=div({style:{minHeight:"100vh",background:"#060d1a",display:"flex",flexDirection:"column",maxWidth:"480px",margin:"0 auto"}},[]);

  // Modals
  if(S.confirmDel){
    const emp=S.emps.find(e=>e.id===S.confirmDel);
    root2.appendChild(Sheet("🗑 حذف موظف",[
      div({style:{color:"#64748b",marginBottom:"20px",fontSize:"14px"}},["هل تريد حذف ",span({style:{color:"#e2e8f0",fontWeight:"700"}},[emp?.name??""]),  "؟"]),
      div({style:{display:"flex",gap:"10px"}},[
        btn({style:{flex:"1",padding:"11px",borderRadius:"12px",background:"transparent",
          color:"#64748b",border:"1px solid #1e3a5f"},onClick:()=>setState({confirmDel:null})},["إلغاء"]),
        btn({style:{flex:"1",padding:"11px",borderRadius:"12px",background:"#ef4444",color:"#fff"},
          onClick:()=>{const id=S.confirmDel;const newEmps=S.emps.filter(e=>e.id!==id);setState({emps:newEmps,confirmDel:null});toast("🗑 تم الحذف")}},["حذف"])
      ])
    ],()=>setState({confirmDel:null})));
  }

  if(S.showAddEmp){
    let lnn="",lnd="",lndc="";
    const nInp=inp({type:"text",style:{background:"#0d1526",border:"1px solid #1e3a5f",color:"#e2e8f0",borderRadius:"10px",padding:"10px 14px",fontSize:"14px",width:"100%"},placeholder:"مثال: أحمد محمد",value:lnn});
    nInp.addEventListener("input",e=>lnn=e.target.value);
    const dSel=sel({style:{background:"#0d1526",border:"1px solid #1e3a5f",color:"#e2e8f0",borderRadius:"10px",padding:"10px 14px",fontSize:"14px",width:"100%"}});
    dSel.appendChild(opt("","— اختر —"));
    S.depts.forEach(d=>dSel.appendChild(opt(d,d)));
    dSel.appendChild(opt("__new__","➕ قسم جديد..."));
    const customWrap=div({style:{display:"none",marginTop:"8px"}},[
      div({style:{fontSize:"12px",color:"#64748b",marginBottom:"6px"}},["اسم القسم الجديد"]),
      inp({type:"text",style:{background:"#0d1526",border:"1px solid #1e3a5f",color:"#e2e8f0",borderRadius:"10px",padding:"10px 14px",fontSize:"14px",width:"100%"},placeholder:"مثال: المناعة"})
    ]);
    dSel.addEventListener("change",e=>{lnd=e.target.value;customWrap.style.display=lnd==="__new__"?"block":"none"});
    customWrap.children[1].addEventListener("input",e=>lndc=e.target.value);
    root2.appendChild(Sheet("➕ إضافة موظف",[
      div({style:{marginBottom:"12px"}},[div({style:{fontSize:"12px",color:"#64748b",marginBottom:"6px"}},["اسم الموظف"]),nInp]),
      div({style:{marginBottom:"8px"}},[div({style:{fontSize:"12px",color:"#64748b",marginBottom:"6px"}},["القسم"]),dSel,customWrap]),
      div({style:{display:"flex",gap:"10px",marginTop:"8px"}},[
        btn({style:{flex:"1",padding:"11px",borderRadius:"12px",background:"transparent",color:"#64748b",border:"1px solid #1e3a5f"},
          onClick:()=>setState({showAddEmp:false})},["إلغاء"]),
        btn({style:{flex:"1",padding:"11px",borderRadius:"12px",background:"#0ea5e9",color:"#fff",fontWeight:"700"},onClick:()=>{
          const dept=lnd==="__new__"?lndc.trim():lnd;
          if(!lnn.trim()||!dept)return;
          const id=_uid++;const newEmps=[...S.emps,{id,name:lnn.trim(),dept}];
          const newDepts=S.depts.includes(dept)?S.depts:[...S.depts,dept];
          const newDc={...S.dc};if(!newDc[dept])newDc[dept]=PAL[Object.keys(newDc).length%PAL.length];
          setState({emps:newEmps,depts:newDepts,dc:newDc,showAddEmp:false});toast(`✅ تم إضافة ${lnn.trim()}`);
        }},["إضافة"])
      ])
    ],()=>setState({showAddEmp:false})));
  }

  if(S.showManage){
    const rows=[];
    S.depts.forEach(dept=>{
      const dclr=deptColor(dept),dE=S.emps.filter(e=>e.dept===dept);
      const dHdr=div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}},[
        span({style:{width:"8px",height:"8px",borderRadius:"50%",background:dclr,display:"inline-block"}}),
        span({style:{color:dclr,fontWeight:"700",fontSize:"14px",flex:"1"}},[dept]),
        span({style:{color:"#334155",fontSize:"11px"}},[String(dE.length)]),
        ...(dE.length===0?[btn({style:{background:"none",border:"1px solid rgba(239,68,68,.25)",
          color:"#ef4444",borderRadius:"8px",padding:"3px 10px",fontSize:"11px"},
          onClick:()=>{const nd2=S.depts.filter(d=>d!==dept);setState({depts:nd2});toast(`🗑 تم حذف ${dept}`)}},["حذف"])]:[] )
      ]);
      rows.push(div({style:{marginBottom:"18px"}},[dHdr,
        ...dE.map(emp=>{
          const r=div({style:{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",
            background:"#0d1526",borderRadius:"10px",marginBottom:"8px"}},[
            span({style:{fontSize:"13px",color:"#cbd5e1",flex:"1"}},[emp.name])
          ]);
          const dSel=sel({style:{background:"#0d1526",border:"1px solid #1e3a5f",color:"#e2e8f0",
            borderRadius:"8px",padding:"6px 10px",fontSize:"12px",maxWidth:"130px"}});
          S.depts.forEach(d=>dSel.appendChild(opt(d,d,d===emp.dept)));
          dSel.addEventListener("change",e=>{const nd2=e.target.value;if(!S.depts.includes(nd2))return;
            const newEmps=S.emps.map(x=>x.id===emp.id?{...x,dept:nd2}:x);setState({emps:newEmps});toast("✅ تم نقل الموظف")});
          const delB=btn({style:{background:"none",border:"1px solid rgba(239,68,68,.2)",
            color:"#ef4444",borderRadius:"8px",padding:"6px 10px",fontSize:"12px",flexShrink:"0"},
            onClick:()=>setState({confirmDel:emp.id})},["🗑"]);
          r.appendChild(dSel);r.appendChild(delB);
          return r;
        }),
        ...(dE.length===0?[div({style:{fontSize:"12px",color:"#1e3a5f",padding:"8px 10px",background:"#0d1526",borderRadius:"8px"}},["لا يوجد موظفون"])]:[] )
      ]));
    });
    // Add dept
    const ndInp=inp({type:"text",style:{background:"#0d1526",border:"1px solid #1e3a5f",color:"#e2e8f0",borderRadius:"10px",padding:"10px 14px",fontSize:"14px",flex:"1"},placeholder:"اسم القسم الجديد..."});
    let ndVal="";ndInp.addEventListener("input",e=>ndVal=e.target.value);
    const addDptBtn=btn({style:{padding:"10px 18px",borderRadius:"10px",background:"#0ea5e9",color:"#fff",fontWeight:"700",fontSize:"14px",flexShrink:"0"},onClick:()=>{
      const n=ndVal.trim();if(!n||S.depts.includes(n)){toast("⚠️ القسم موجود");return}
      const nd2=[...S.depts,n],newDc={...S.dc};newDc[n]=PAL[Object.keys(newDc).length%PAL.length];
      setState({depts:nd2,dc:newDc});toast(`✅ تم إضافة قسم ${n}`);ndInp.value="";ndVal="";
    }},["إضافة"]);
    root2.appendChild(Sheet("⚙️ إدارة الأقسام",[
      div({style:{fontSize:"12px",color:"#475569",marginBottom:"16px"}},["انقل موظفًا أو احذفه"]),
      ...rows,
      div({style:{borderTop:"1px solid #1e3a5f",paddingTop:"16px",marginTop:"8px"}},[
        div({style:{fontSize:"13px",fontWeight:"700",color:"#94a3b8",marginBottom:"10px"}},["➕ إضافة قسم جديد"]),
        div({style:{display:"flex",gap:"8px"}},[ndInp,addDptBtn])
      ]),
      btn({style:{width:"100%",marginTop:"14px",padding:"11px",borderRadius:"12px",
        background:"transparent",color:"#64748b",border:"1px solid #1e3a5f"},
        onClick:()=>setState({showManage:false})},["إغلاق"])
    ],()=>setState({showManage:false})));
  }

  if(S.showMonthPicker){
    const yRow=div({style:{display:"flex",gap:"10px",marginBottom:"16px"}},
      [2024,2025,2026,2027].map(y=>btn({style:{flex:"1",padding:"9px 4px",borderRadius:"10px",
        border:`1.5px solid ${S.year===y?"#0ea5e9":"#1e3a5f"}`,
        background:S.year===y?"#0ea5e920":"#0d1526",color:S.year===y?"#0ea5e9":"#64748b",
        fontSize:"13px",fontWeight:S.year===y?"700":"400"},
        onClick:()=>setState({year:y})},String(y)))
    );
    const mGrid=div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}},
      MONTHS.map((m,i)=>btn({style:{padding:"10px 4px",borderRadius:"10px",
        border:`1.5px solid ${S.mIdx===i?"#0ea5e9":"#1e3a5f"}`,
        background:S.mIdx===i?"#0ea5e920":"#0d1526",color:S.mIdx===i?"#0ea5e9":"#94a3b8",
        fontSize:"13px",fontWeight:S.mIdx===i?"700":"400"},
        onClick:()=>setState({mIdx:i,showMonthPicker:false})},m.n))
    );
    root2.appendChild(Sheet("اختر الشهر والسنة",[yRow,mGrid],()=>setState({showMonthPicker:false})));
  }

  // Header
  const hdr=div({style:{background:"#0d1a2e",padding:"52px 20px 14px",
    borderBottom:"1px solid rgba(30,58,95,.2)",flexShrink:"0"}},[
    div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}},[
      div([
        div({style:{fontSize:"18px",fontWeight:"700",color:"#f1f5f9"}},["🏥 مهام العمل"]),
        div({style:{fontSize:"12px",color:"#475569",marginTop:"2px"}},[`${S.emps.length} موظف · ${S.depts.length} أقسام`])
      ]),
      btn({style:{display:"flex",alignItems:"center",gap:"6px",background:"#1e3a5f",
        color:"#38bdf8",borderRadius:"12px",padding:"8px 14px",fontSize:"13px",fontWeight:"700"},
        onClick:()=>setState({showMonthPicker:true})},[
        span([mo.n]),span({style:{color:"#475569"}},[String(S.year)]),span({style:{fontSize:"10px"}},["▾"])
      ])
    ]),
    div({style:{display:"flex",gap:"8px",overflowX:"auto",paddingBottom:"2px"}},
      Object.entries(SC).map(([k,v])=>{
        const tot=S.emps.reduce((a,e)=>a+getRow(e.id).filter(s=>s===k).length,0);
        return div({style:{flexShrink:"0",display:"flex",alignItems:"center",gap:"6px",
          background:v.bg,border:`1px solid ${v.clr}40`,borderRadius:"20px",padding:"5px 13px"}},[
          span({style:{fontSize:"13px",fontWeight:"700",color:v.clr}},[k]),
          span({style:{fontSize:"12px",color:"#64748b"}},[String(tot)])
        ]);
      })
    )
  ]);
  root2.appendChild(hdr);

  // Dept cards
  const list=div({class:"scroll",style:{flex:"1",padding:"14px 16px 110px"}},[]);
  S.depts.forEach(dept=>{
    const dclr=deptColor(dept),dE=sEmps.filter(e=>e.dept===dept);
    const card=div({style:{background:"#0d1a2e",borderRadius:"14px",marginBottom:"12px",
      overflow:"hidden",border:`1px solid ${dclr}25`}},[]);

    const dHdr=div({style:{display:"flex",alignItems:"center",gap:"10px",padding:"12px 14px",
      cursor:"pointer",background:`${dclr}0d`}},[
      span({style:{width:"10px",height:"10px",borderRadius:"50%",background:dclr,display:"inline-block",flexShrink:"0"}}),
      span({style:{fontSize:"15px",fontWeight:"700",color:"#f1f5f9",flex:"1"}},[dept]),
      span({style:{fontSize:"12px",color:"#475569"}},[`${dE.length} موظف`]),
      span({style:{fontSize:"18px",color:"#1e3a5f"}},["›"])
    ]);
    dHdr.addEventListener("click",()=>setState({screen:"dept",selDept:dept}));
    card.appendChild(dHdr);

    dE.forEach(emp=>{
      const preview=getRow(emp.id).slice(-5);
      const eRow=div({style:{display:"flex",alignItems:"center",gap:"10px",padding:"9px 14px",
        cursor:"pointer",borderTop:`1px solid ${dclr}15`}},[
        div({style:{flex:"1",minWidth:"0"}},[
          div({style:{fontSize:"13px",color:"#cbd5e1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[emp.name])
        ]),
        div({style:{display:"flex",gap:"3px",flexShrink:"0"}},
          preview.map(s=>{const c=SC[s]||SC.M;return div({style:{width:"26px",height:"26px",
            display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"6px",
            background:c.bg,color:c.clr,fontSize:"10px",fontWeight:"700"}},[s==="O"?"·":s])})
        ),
        span({style:{fontSize:"18px",color:"#1e3a5f"}},["›"])
      ]);
      eRow.addEventListener("click",()=>setState({screen:"emp",selEmp:emp.id}));
      card.appendChild(eRow);
    });
    if(dE.length===0){
      card.appendChild(div({style:{padding:"10px 14px",fontSize:"12px",color:"#1e3a5f",
        borderTop:`1px solid ${dclr}15`}},["لا يوجد موظفون"]));
    }
    list.appendChild(card);
  });
  root2.appendChild(list);

  // Bottom bar
  root2.appendChild(div({style:{position:"sticky",bottom:"0",background:"#0d1a2e",
    borderTop:"1px solid rgba(30,58,95,.3)",padding:"10px 12px 24px",display:"flex",gap:"8px",zIndex:"100"}},[
    btn({style:{flex:"1",padding:"11px",borderRadius:"12px",border:"1px solid rgba(34,197,94,.25)",
      background:"#0d1526",color:"#22c55e",fontSize:"13px",fontWeight:"600"},
      onClick:()=>setState({showAddEmp:true})},["➕ موظف"]),
    btn({style:{flex:"1",padding:"11px",borderRadius:"12px",border:"1px solid rgba(167,139,250,.25)",
      background:"#0d1526",color:"#a78bfa",fontSize:"13px",fontWeight:"600"},
      onClick:()=>setState({showManage:true})},["⚙️ أقسام"]),
    btn({style:{flex:"1",padding:"11px",borderRadius:"12px",border:"1px solid rgba(56,189,248,.25)",
      background:"#0d1526",color:"#38bdf8",fontSize:"13px",fontWeight:"600"},onClick:()=>{
      const mo2=MONTHS[S.mIdx],nd2=mo2.d,DAYS2=Array.from({length:nd2},(_,i)=>i+1);
      const sE=sortedEmps();
      const hdr2=["اسم الموظف","القسم","الشهر",...DAYS2.map(String)].join(",");
      const rows2=sE.map(e=>[e.name,e.dept,mo2.n,...getRow(e.id)].join(","));
      const csv="\uFEFF"+[hdr2,...rows2].join("\n");
      const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
      const url=URL.createObjectURL(blob);const a=document.createElement("a");
      a.href=url;a.download=`جدول_${mo2.n}_${S.year}.csv`;a.click();URL.revokeObjectURL(url);
      toast("✅ تم تصدير CSV");
    }},["⬇ CSV"])
  ]));

  return root2;
}

// ═══════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  // Remove previous screen
  const old=root.querySelector(".screen, div:not(#toast)");
  while(root.firstChild){root.removeChild(root.firstChild)}

  let node;
  if(S.screen==="emp") node=renderEmpScreen();
  else if(S.screen==="dept") node=renderDeptScreen();
  else node=renderMainScreen();

  if(node) root.appendChild(node);
}

// Start
render();
</script>
</body>
</html>

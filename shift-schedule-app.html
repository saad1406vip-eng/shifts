<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الورديات</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .app-container {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        h1, h2 {
            text-align: center;
        }

        .shift-form input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            box-sizing: border-box;
        }

        .shift-form button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .shift-form button:hover {
            background-color: #0056b3;
        }

        .shift-list ul {
            list-style-type: none;
            padding: 0;
        }

        .shift-list li {
            background-color: #e9e9e9;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        .shift-list li button {
            background-color: #dc3545;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .shift-list li button:hover {
            background-color: #a71d2a;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>جدول الورديات</h1>
        <div class="shift-form">
            <input type="text" id="employeeName" placeholder="اسم الموظف">
            <input type="date" id="shiftDate">
            <input type="text" id="shiftTime" placeholder="مثال: 08:00 - 16:00">
            <button id="addShiftBtn">إضافة وردية</button>
        </div>
        <div class="shift-list">
            <h2>الورديات الحالية</h2>
            <ul id="shiftList"></ul>
        </div>
    </div>

    <script>
        const addShiftBtn = document.getElementById('addShiftBtn');
        const shiftList = document.getElementById('shiftList');

        addShiftBtn.addEventListener('click', () => {
            const name = document.getElementById('employeeName').value.trim();
            const date = document.getElementById('shiftDate').value;
            const time = document.getElementById('shiftTime').value.trim();

            if (!name || !date || !time) {
                alert('الرجاء ملء جميع الحقول');
                return;
            }

            const li = document.createElement('li');
            li.textContent = `${name} - ${date} - ${time}`;

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'حذف';
            deleteBtn.addEventListener('click', () => li.remove());

            li.appendChild(deleteBtn);
            shiftList.appendChild(li);

            document.getElementById('employeeName').value = '';
            document.getElementById('shiftDate').value = '';
            document.getElementById('shiftTime').value = '';
        });
    </script>
</body>
</html>
